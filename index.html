<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会计学 · 刷题目录</title>
<style>
  :root{
    --paper:#EEF0EC; --card:#FBFBF8; --ink:#16323C; --ink-soft:#42565d;
    --line:#d7dcd6; --gold:#C0922B; --gold-soft:#f3ead0; --green:#1E7A52;
    --green-bg:#e3f1e8; --shadow:0 1px 2px rgba(20,50,60,.06),0 8px 24px rgba(20,50,60,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:var(--paper);color:var(--ink);line-height:1.65;font-size:16px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px;}

  header{margin:8px 2px 14px;border-bottom:2px solid var(--ink);padding-bottom:14px;}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;font-family:Georgia,"Times New Roman",serif;}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:26px;margin:5px 0 3px;font-weight:700;letter-spacing:-.01em;}
  .sub{font-size:13px;color:var(--ink-soft);}

  .lead{font-size:14px;color:var(--ink-soft);margin:16px 2px 10px;}
  .list{display:flex;flex-direction:column;gap:11px;}
  a.row{
    display:flex;align-items:center;gap:14px;text-decoration:none;
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:15px 16px;color:var(--ink);transition:.15s;box-shadow:var(--shadow);
  }
  a.row:hover,a.row:active{border-color:var(--ink);transform:translateY(-1px);}
  .no{font-family:Georgia,serif;font-size:22px;font-weight:700;color:var(--gold);min-width:46px;line-height:1;}
  .no small{display:block;font-size:10px;letter-spacing:.1em;color:var(--ink-soft);font-weight:400;margin-top:3px;}
  .meta{flex:1;min-width:0;}
  .title{font-weight:700;font-size:15.5px;}
  .topics{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;}
  .b{font-family:Georgia,serif;font-size:11px;padding:1px 8px;border-radius:10px;}
  .b.best{background:var(--green);color:#fff;}
  .b.wrong{background:var(--gold-soft);color:#8a6a16;}
  .b.none{background:#e7eae5;color:var(--ink-soft);}
  .arrow{font-size:20px;color:var(--ink-soft);flex:none;}

  footer{text-align:center;font-size:12px;color:#9aa6a2;margin-top:26px;font-family:Georgia,serif;line-height:1.8;}
  footer button{font-family:inherit;font-size:12px;color:var(--ink-soft);background:none;border:none;text-decoration:underline;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Financial Accounting · 刷题导航</div>
    <h1>会计学刷题 · 章节目录</h1>
    <div class="sub">点任一章节进入 · 做题记录与最佳成绩存在本机 · 期末加油 🌿</div>
  </header>

  <p class="lead">已收录第一章到第八章，下方徽章显示你在本设备上的最佳成绩与错题数。</p>
  <div class="list" id="list"></div>

  <footer>
    会计学财务会计 · 共 8 章<br>
    <button id="reset">清空本机全部章节记录</button>
  </footer>
</div>

<script>
const chapters=[
  {file:"kuaiji1&2.html", no:"1–2", title:"财务报表与商业决策 · 投融资与会计制度", topics:"四张报表 · 借贷规则 · 流动比率/财务杠杆", key:"kuaiji12_v1"},
  {file:"kuaiji3&4.html", no:"3–4", title:"经营决策与利润表 · 调整与收益质量", topics:"权责发生制 · 递延/计提 · 结账 · EPS/净利润率", key:"kuaiji34_v1"},
  {file:"kuaiji5.html", no:"5", title:"会计信息的传递与解释", topics:"参与者 · 信息披露 · 报表格式 · ROA/杜邦", key:"kuaiji5_v1"},
  {file:"kuaiji6.html", no:"6", title:"销售收入、应收款项与现金", topics:"收入确认 · 坏账两法 · 银行调节表", key:"kuaiji6_v1"},
  {file:"kuaiji7.html", no:"7", title:"存货与商品销售成本", topics:"FIFO/LIFO · 成本与市价孰低 · 周转率", key:"kuaiji7_v1"},
  {file:"kuaiji8.html", no:"8", title:"固定资产、自然资源与无形资产", topics:"折旧三法 · 减值/处置 · 摊销/折耗", key:"kuaiji8_v1"}
];

function readStore(key){
  if(!key) return null;
  try{const s=JSON.parse(localStorage.getItem(key));return (s&&s.sec)?s:null;}catch(e){return null;}
}

function badges(key){
  const s=readStore(key);
  if(!s) return '<span class="b none">未开始</span>';
  let best=0,any=false;
  for(const k in s.sec){ if(typeof s.sec[k].best==='number'){ best=Math.max(best,s.sec[k].best); any=true; } }
  const wrong=(s.wrong&&s.wrong.length)||0;
  let html='';
  if(any) html+=`<span class="b best">最佳 ${best}%</span>`;
  if(wrong) html+=`<span class="b wrong">错题 ${wrong}</span>`;
  if(!html) html='<span class="b none">未开始</span>';
  return html;
}

document.getElementById('list').innerHTML=chapters.map(c=>`
  <a class="row" href="${encodeURIComponent(c.file)}">
    <span class="no">${c.no}<small>CH</small></span>
    <span class="meta">
      <span class="title">${c.title}</span>
      <span class="topics">${c.topics}</span>
      <span class="badges">${badges(c.key)}</span>
    </span>
    <span class="arrow">›</span>
  </a>`).join('');

document.getElementById('reset').onclick=()=>{
  if(!confirm('确定清空本机全部章节的做题记录（最佳成绩+错题本）吗？不可恢复。')) return;
  chapters.forEach(c=>{ if(c.key){ try{localStorage.removeItem(c.key);}catch(e){} } });
  location.reload();
};
</script>
</body>
</html>
