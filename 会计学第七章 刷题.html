<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会计学 · 第七章 刷题</title>
<style>
  :root{
    --paper:#EEF0EC;
    --card:#FBFBF8;
    --ink:#16323C;
    --ink-soft:#42565d;
    --line:#d7dcd6;
    --gold:#C0922B;
    --gold-soft:#f3ead0;
    --green:#1E7A52;
    --green-bg:#e3f1e8;
    --red:#C0392B;
    --red-bg:#f7e4e1;
    --shadow:0 1px 2px rgba(20,50,60,.06),0 8px 24px rgba(20,50,60,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.65;
    font-size:16px;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 60px;}

  header{margin:8px 2px 18px;border-bottom:2px solid var(--ink);padding-bottom:12px;}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;font-family:Georgia,"Times New Roman",serif;}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:25px;margin:4px 0 2px;font-weight:700;letter-spacing:-.01em;}
  .sub{font-size:13px;color:var(--ink-soft);}

  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px;}

  .lead{font-size:14.5px;color:var(--ink-soft);margin:0 0 16px;}
  .sec-list{display:flex;flex-direction:column;gap:10px;}
  .sec-btn{
    display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;
    font:inherit;color:var(--ink);transition:.15s;box-shadow:var(--shadow);
  }
  .sec-btn:hover,.sec-btn:active{border-color:var(--ink);transform:translateY(-1px);}
  .sec-no{font-family:Georgia,serif;font-size:19px;font-weight:700;color:var(--gold);min-width:34px;}
  .sec-meta{flex:1;}
  .sec-title{font-weight:600;font-size:15.5px;}
  .sec-desc{font-size:12.5px;color:var(--ink-soft);margin-top:1px;}
  .sec-right{text-align:right;white-space:nowrap;}
  .sec-count{font-size:12px;color:var(--ink-soft);font-family:Georgia,serif;}
  .sec-badge{display:block;font-family:Georgia,serif;font-size:11px;color:#fff;background:var(--green);border-radius:10px;padding:1px 8px;margin-top:4px;}
  .all-btn{background:var(--ink);color:#fff;border-color:var(--ink);}
  .all-btn .sec-no,.all-btn .sec-count{color:#d9c89a;}
  .all-btn .sec-desc{color:#b7c4c1;}
  .wrong-btn{background:var(--red-bg);border-color:#eccac4;}
  .wrong-btn .sec-no{color:var(--red);}

  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px;}
  .pill{font-family:Georgia,serif;font-size:13px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:20px;padding:4px 12px;}
  .pill b{color:var(--ink);}
  .quit{background:none;border:none;color:var(--ink-soft);font:inherit;font-size:13px;cursor:pointer;text-decoration:underline;padding:4px;}
  .bar{height:6px;background:var(--line);border-radius:6px;overflow:hidden;margin-bottom:16px;}
  .bar > i{display:block;height:100%;background:var(--gold);border-radius:6px;transition:width .35s ease;}

  .qhead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .tag{font-size:11px;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:6px;background:var(--gold-soft);color:#8a6a16;}
  .tag.multi{background:#e4ecf3;color:#2a5572;}
  .tag.judge{background:#eae6f0;color:#5b4a78;}
  .tag.calc{background:#fbe6d9;color:#9a4f1c;}
  .tag.fill{background:#dde9e3;color:#1a6b4f;}
  .secref{font-family:Georgia,serif;font-size:12px;color:var(--ink-soft);}
  .qtext{font-size:17px;font-weight:600;margin:2px 0 16px;line-height:1.55;}
  .qtext .blank{border-bottom:1.5px solid var(--gold);padding:0 22px;}

  .opts{display:flex;flex-direction:column;gap:9px;}
  .opt{
    display:flex;gap:11px;align-items:flex-start;cursor:pointer;
    border:1px solid var(--line);border-radius:11px;padding:12px 14px;font:inherit;
    background:#fff;text-align:left;color:var(--ink);transition:.12s;width:100%;
  }
  .opt:hover{border-color:var(--ink-soft);}
  .opt .mk{
    font-family:Georgia,serif;font-weight:700;font-size:14px;min-width:22px;height:22px;
    border:1.5px solid var(--ink-soft);border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);flex-shrink:0;margin-top:1px;
  }
  .opt.sel{border-color:var(--ink);background:#f0f3f0;}
  .opt.sel .mk{background:var(--ink);color:#fff;border-color:var(--ink);}
  .opt.correct{border-color:var(--green);background:var(--green-bg);}
  .opt.correct .mk{background:var(--green);color:#fff;border-color:var(--green);}
  .opt.wrong{border-color:var(--red);background:var(--red-bg);}
  .opt.wrong .mk{background:var(--red);color:#fff;border-color:var(--red);}
  .opt.locked{cursor:default;}
  .otext{flex:1;font-size:15px;line-height:1.5;}

  /* table fill */
  .tablewrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:2px 0 4px;border-radius:10px;}
  table.qtable{border-collapse:collapse;width:100%;font-size:13.5px;}
  table.qtable th,table.qtable td{border:1px solid var(--line);padding:8px 8px;text-align:center;}
  table.qtable th{background:var(--ink);color:#fff;font-weight:600;font-size:12.5px;}
  table.qtable td:first-child{text-align:left;font-weight:600;background:#f4f5f1;white-space:nowrap;}
  input.tin{font-family:Georgia,serif;font-size:14px;width:74px;text-align:center;border:none;border-bottom:1.5px solid var(--gold);background:#fff;padding:4px 2px;color:var(--ink);border-radius:3px 3px 0 0;}
  input.tin:focus{outline:none;border-bottom-color:var(--ink);background:#fffef8;}
  input.tin.tok{border-bottom-color:var(--green);background:var(--green-bg);color:var(--green);font-weight:700;}
  input.tin.tno{border-bottom-color:var(--red);background:var(--red-bg);color:var(--red);font-weight:700;}
  .hint{font-size:12px;color:var(--ink-soft);margin:9px 2px 2px;}

  .fb{margin-top:15px;border-radius:11px;padding:13px 15px;font-size:14.5px;display:none;border:1px solid;}
  .fb.show{display:block;}
  .fb.ok{background:var(--green-bg);border-color:#bfe0cd;}
  .fb.no{background:var(--red-bg);border-color:#eccac4;}
  .fb .verdict{font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .fb.ok .verdict{color:var(--green);}
  .fb.no .verdict{color:var(--red);}
  .fb .ans{font-family:Georgia,serif;font-weight:700;}
  .fb .exp{color:var(--ink);line-height:1.6;}
  .fb .exp b{color:var(--ink);}

  .btn{
    display:block;width:100%;margin-top:14px;cursor:pointer;border:none;font:inherit;
    background:var(--ink);color:#fff;font-weight:600;font-size:16px;border-radius:11px;padding:14px;transition:.15s;
  }
  .btn:hover{background:#0f262e;}
  .btn:disabled{background:#b9c3c0;cursor:not-allowed;}
  .btn.ghost{background:none;color:var(--ink);border:1.5px solid var(--ink);}
  .btn.ghost:hover{background:#f0f3f0;}

  .score-num{font-family:Georgia,serif;font-size:54px;font-weight:700;line-height:1;color:var(--ink);text-align:center;margin:6px 0 2px;}
  .score-num span{font-size:24px;color:var(--ink-soft);}
  .score-label{text-align:center;color:var(--ink-soft);font-size:14px;margin-bottom:16px;}
  .verdict-line{text-align:center;font-size:16px;font-weight:600;margin-bottom:18px;padding:10px;border-radius:10px;background:var(--gold-soft);color:#8a6a16;}
  .review-h{font-family:Georgia,serif;font-size:14px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-soft);border-bottom:1px solid var(--line);padding-bottom:7px;margin:22px 0 12px;}
  .rev-item{border-left:3px solid var(--red);padding:4px 0 4px 13px;margin-bottom:16px;}
  .rev-q{font-size:14.5px;font-weight:600;margin-bottom:5px;}
  .rev-line{font-size:13.5px;color:var(--ink-soft);}
  .rev-line .c{color:var(--green);font-weight:600;}
  .rev-exp{font-size:13px;color:var(--ink-soft);margin-top:5px;background:#f4f5f1;border-radius:8px;padding:8px 11px;}
  .reset-link{display:inline-block;margin:6px 2px 0;color:var(--ink-soft);font-size:12.5px;text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;}
  footer{text-align:center;font-size:12px;color:#9aa6a2;margin-top:24px;font-family:Georgia,serif;}
  .hidden{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Financial Accounting · Ch.7</div>
    <h1>存货与商品销售成本</h1>
    <div class="sub">FIFO/LIFO 容易绕？做一遍比看十遍管用 · 每题带解析 · 记录存本机</div>
  </header>

  <div id="app"></div>

  <footer id="foot">选一个章节开始 · 共 <span id="totalQ"></span> 题 · 记录已存在本机</footer>
</div>

<script>
/* ============ 题库 ============ */
const SECTIONS = {
  "7.1":"存货与销售成本的特征",
  "7.2":"四种成本计价方法及选择",
  "7.3":"成本与市价孰低法（减值）",
  "7.4":"存货控制（永续/定期）",
  "7.5":"存货评估管理与现金流"
};
const SEC_DESC = {
  "7.1":"存货分类 · 采购成本 · 成本流转 · 销货成本公式 · 购货退回与折扣",
  "7.2":"具体辨认 · FIFO · LIFO · 平均成本 · 选择与一致性",
  "7.3":"NRV · 减值分录 · 持有损失 · 谨慎性",
  "7.4":"永续盘存 · 定期盘存 · 期末存货错误影响",
  "7.5":"存货周转率 · LIFO准备 · LIFO→FIFO · 现金流调整"
};
const Q = [
/* ===== 7.1 ===== */
{sec:"7.1",type:"single",q:"下列关于“存货”的表述，正确的是：",
opts:["存货是企业持有备售或用于生产产品/提供劳务的<b>有形</b>流动资产","存货一律属于非流动资产","存货只包括待售的产成品","存货包括用于经营的固定设备"],ans:[0],
exp:"存货是企业在日常活动中持有、<b>以备销售或用以生产产品和提供劳务的有形资产</b>，属<b>流动</b>资产。"},

{sec:"7.1",type:"multi",q:"【多选】制造业企业的存货通常包括：",
opts:["原材料存货","在产品存货","产成品存货","经营用厂房设备"],ans:[0,1,2],
exp:"制造业三类存货：<b>原材料</b>（待加工）→<b>在产品</b>（加工中）→<b>产成品</b>（完工待售）。厂房设备是固定资产，不是存货。"},

{sec:"7.1",type:"single",q:"购入商品存货时，下列哪项<b>不</b>应计入存货采购成本？",
opts:["发票金额","入库前的运费","验收与准备成本","销售部门的工资、经销商培训会议费"],ans:[3],
exp:"存货成本=达到可使用/可销售状态<b>之前</b>发生的所有成本（发票额+入库前运费、验收、准备）。销售部门工资、培训费发生在存货可供使用<b>之后</b>，计入当期销售/管理费用。"},

{sec:"7.1",type:"judge",q:"【判断】验收和准备成本金额通常不大，依据重要性原则可不分配到采购成本，实务中有时确认为其他成本。",
opts:["正确","错误"],ans:[0],
exp:"对。<b>重要性原则</b>：金额不重要的验收/准备成本可不逐项分配进采购成本。"},

{sec:"7.1",type:"single",q:"制造企业存货成本流转的正确顺序是：",
opts:["原材料 → 在产品 → 产成品 → 销售成本","产成品 → 在产品 → 原材料 → 销售成本","原材料 → 产成品 → 在产品 → 销售成本","在产品 → 原材料 → 产成品 → 销售成本"],ans:[0],
exp:"购入<b>原材料</b>→领用生产转入<b>在产品</b>（含人工、制造费用）→完工转入<b>产成品</b>→售出结转<b>销售成本</b>。"},

{sec:"7.1",type:"calc",q:"期初存货 $40,000，本期购入商品 $55,000，期末存货 $35,000。本期商品销售成本为：",
opts:["$60,000","$50,000","$95,000","$130,000"],ans:[0],
exp:"公式：<b>期初存货 + 本期采购 − 期末存货 = 销货成本</b>。可供销售 = 40,000+55,000=95,000；销货成本 = 95,000−35,000 = <b>$60,000</b>。"},

{sec:"7.1",type:"single",q:"发生“购货退回与折让”时，正确的处理是：",
opts:["增加采购存货成本","减少采购存货成本，并记录现金退款或减少应付账款","只调减收入","计入销售费用"],ans:[1],
exp:"购货退回/折让要<b>减少采购存货的成本</b>，同时记录现金退款（现金增加）或减少对供应商的负债（应付账款减少）。"},

{sec:"7.1",type:"single",q:"在供应商优惠期内提前付款获得现金折扣，对存货账户的影响是：",
opts:["增加存货成本","减少存货以冲减节省的那部分成本","不影响存货","计入财务费用"],ans:[1],
exp:"取得付款折扣时，<b>减少存货</b>以冲减节省的成本。例：应付 $1,000，付现 $980，存货 −$20。"},

/* ===== 7.2 ===== */
{sec:"7.2",type:"judge",q:"【判断】成本流动假设（如 FIFO/LIFO）的选择，必须与商品在货架上的实际出入库顺序一致。",
opts:["正确","错误"],ans:[1],
exp:"错。<b>成本流动假设的选择并不基于实物的实际流动</b>。公司可不论实物流转选择任一方法。"},

{sec:"7.2",type:"single",q:"最适合采用“具体辨认法”的是：",
opts:["大量同质的螺丝钉","贵重且唯一性的商品（如房屋、贵重首饰）","快消食品","标准化原材料"],ans:[1],
exp:"具体辨认法逐件跟踪成本，适用于<b>贵重、唯一</b>的商品；货物量大且相似时不适用。"},

{sec:"7.2",type:"single",q:"FIFO（先进先出）结转成本的假定是：",
opts:["最新购入的先售出，最早购入的留在期末存货","最早购入的先售出，最后购入的留在期末存货","随机结转","按平均成本结转"],ans:[1],
exp:"<b>FIFO</b>：假定<b>最早入库的先售出</b>，最后购买的留存于期末存货。"},

{sec:"7.2",type:"single",q:"LIFO（后进先出）结转成本的假定是：",
opts:["最新购入的先售出，最早购入的留在期末存货","最早购入的先售出","按数量平均","按市价结转"],ans:[0],
exp:"<b>LIFO</b>：假定<b>最新入库的先售出</b>，最早购买的留存于期末存货。"},

{sec:"7.2",type:"table",q:"存货成本【持续上升】时，填出 FIFO 与 LIFO 对各项目的“高 / 低”影响：",
hint:"每格填「高」或「低」。",
headers:["成本上升时","FIFO","LIFO"],
rows:[
 ["利润表中销售成本",{a:["低"]},{a:["高"]}],
 ["净利润",{a:["高"]},{a:["低"]}],
 ["所得税",{a:["高"]},{a:["低"]}],
 ["资产负债表期末存货",{a:["高"]},{a:["低"]}]
],
exp:"成本上升时：<b>FIFO</b> 结转的是早期较低成本→销售成本<b>低</b>、净利润<b>高</b>、所得税<b>高</b>、期末存货<b>高</b>；<b>LIFO</b> 结转的是近期较高成本→销售成本<b>高</b>、净利润<b>低</b>、所得税<b>低</b>、期末存货<b>低</b>。（成本下降时全部相反。）"},

{sec:"7.2",type:"calc",q:"加权平均法：可供销售商品为 2 件@$70、4 件@$80、1 件@$100。其单位加权平均成本为：",
opts:["$80","$83.3","$70","$90"],ans:[0],
exp:"总成本 = 2×70+4×80+1×100 = 140+320+100 = $560；总数量 = 7；加权平均 = 560÷7 = <b>$80/件</b>。销售成本与期末存货都用这个单位成本。"},

{sec:"7.2",type:"single",q:"关于“LIFO 一致性规则”，正确的是：",
opts:["税表用 LIFO 时，财务报表也必须用 LIFO 计算存货和销售成本","税表用 LIFO 时，财务报表可任意选用 FIFO","只对财务报表有约束","与税务无关"],ans:[0],
exp:"<b>LIFO 一致性规则</b>：若纳税申报表使用 LIFO，则财务报表计算存货成本和销售成本也<b>必须</b>使用 LIFO。"},

{sec:"7.2",type:"single",q:"存货成本【上升】时，仅从“少缴所得税”出发，纳税申报表应选用：",
opts:["FIFO","LIFO","具体辨认法","平均成本法"],ans:[1],
exp:"成本上升时 <b>LIFO</b> 销售成本最高、税前利润最低，所得税费用更低（最少最迟原则）。"},

{sec:"7.2",type:"judge",q:"【判断】会计准则允许公司一个期间用 LIFO、下一期间改用 FIFO、再改回 LIFO 以优化结果。",
opts:["正确","错误"],ans:[1],
exp:"错。<b>一致性</b>要求不同会计期间方法保持一致，不得随意来回切换；只有能证明变更可改进计量时才允许变更。"},

/* ===== 7.3 ===== */
{sec:"7.3",type:"single",q:"“成本与市价（可变现净值）孰低法”的核心规则是：",
opts:["一律按成本计量","成本与可变现净值哪个低就按哪个确定","一律按可变现净值计量","按重置成本计量"],ans:[1],
exp:"存货初始按成本计量；当期末<b>可变现净值（NRV）低于成本</b>时，按 NRV 确定单位成本——<b>孰低</b>。"},

{sec:"7.3",type:"single",q:"可变现净值（NRV）的计算是：",
opts:["销售价格 − 销售费用","销售价格 + 销售费用","成本 − 销售费用","重置成本 − 销售费用"],ans:[0],
exp:"<b>NRV = 销售价格 − 销售费用</b>。"},

{sec:"7.3",type:"single",q:"当某项存货的 NRV 低于成本时，应当：",
opts:["在未来出售时才确认损失","在当期确认这笔“持有损失”，将账面价值减记至 NRV","计入资本公积","不作处理"],ans:[1],
exp:"NRV<成本→减值，<b>当期</b>确认持有损失（账面损失，非卖出造成），不可延后。分录：借 商品销售成本，贷 存货。"},

{sec:"7.3",type:"judge",q:"【判断】若存货的可变现净值高于成本，按 GAAP 应确认存货的持有收益（增值）。",
opts:["正确","错误"],ans:[1],
exp:"错。NRV≥成本时<b>不处理</b>；<b>GAAP 不允许确认存货持有收益</b>（只减不增）。"},

{sec:"7.3",type:"single",q:"成本与市价孰低法体现的会计原则是：",
opts:["历史成本原则","谨慎性（稳健性）原则","收入实现原则","重要性原则"],ans:[1],
exp:"孰低法基于<b>谨慎性/稳健性原则</b>，要求避免高估资产和收入。"},

{sec:"7.3",type:"single",q:"存货减记对利润的跨期影响是：",
opts:["整个周期利润减少","当期利润减少、未来出售时利润回升，整个周期利润不变","当期利润增加","只影响资产不影响利润"],ans:[1],
exp:"当期减记→损失确认、利润减少；未来出售时成本已变低→毛利变高、利润回升。<b>整周期利润不变，只是前期减、后期增</b>。"},

{sec:"7.3",type:"multi",q:"【多选】孰低法对哪些企业尤为重要？",
opts:["产品成本与售价持续下降的高科技制造企业","销售季节性商品（如服装）的企业","完全无存货的纯服务公司","政府机关"],ans:[0,1],
exp:"对<b>高科技制造</b>（成本/售价下行）和<b>季节性商品</b>（季末大幅贬值）的企业尤为重要。"},

/* ===== 7.4 ===== */
{sec:"7.4",type:"single",q:"永续盘存制（实时盘存）的特点是：",
opts:["每次购入或销售都实时更新存货与销售成本账户","平时不记销售成本，仅期末盘点","只在年末更新一次","不需要任何账面记录"],ans:[0],
exp:"<b>永续盘存制</b>：每笔购销实时更新存货与销售成本，可提供任意时点的期末存货与销售成本。"},

{sec:"7.4",type:"judge",q:"【判断】永续盘存制下，每笔销售要编两笔分录：一笔记销售收入，一笔同步结转销售成本。",
opts:["正确","错误"],ans:[0],
exp:"对。永续制每笔销售<b>两笔分录</b>：①确认销售收入；②同步减少存货、确认销售成本。"},

{sec:"7.4",type:"single",q:"定期盘存制的特点是：",
opts:["平时不记销售成本和库存变动，期末实地盘点后统一计算","每笔销售实时结转成本","不需要期末盘点","随时都能精确得出销售成本"],ans:[0],
exp:"<b>定期盘存制</b>：平时只记销售收入，<b>期末</b>实地盘点结存存货，再统一推算销售成本，其他时间只能估计。"},

{sec:"7.4",type:"single",q:"定期盘存制下，销售成本的计算式为：",
opts:["期末存货 − 期初存货 + 进货","期初存货 + 进货 − 期末存货","进货 − 期末存货","期初存货 + 期末存货 − 进货"],ans:[1],
exp:"<b>销售成本 = 期初存货 + 进货 − 期末存货</b>（期末盘点后倒推）。"},

{sec:"7.4",type:"multi",q:"【多选】期末存货计量发生错误，会产生哪些影响？",
opts:["同时影响资产负债表（资产项）","同时影响利润表（销货成本、毛利、净利润）","影响当期净利润","影响下一会计期间净利润"],ans:[0,1,2,3],
exp:"全对。期末存货错误<b>同时影响两个报表</b>，且<b>影响两期</b>——因为当期期末存货即下期期初存货（跨期效应）。"},

/* ===== 7.5 ===== */
{sec:"7.5",type:"single",q:"存货周转率的计算公式是：",
opts:["销售净额 ÷ 平均存货","商品销售成本 ÷ 平均存货余额","平均存货 ÷ 销售成本","期末存货 ÷ 期初存货"],ans:[1],
exp:"<b>存货周转率 = 商品销售成本 ÷ 平均存货余额</b>；平均存货=(期初+期末)/2。比率越高，周转越快。"},

{sec:"7.5",type:"calc",q:"商品销售成本 $600,000，期初存货 $90,000，期末存货 $110,000。存货周转率约为：",
opts:["6 次","6.7 次","5.5 次","12 次"],ans:[0],
exp:"平均存货 = (90,000+110,000)/2 = 100,000；周转率 = 600,000 ÷ 100,000 = <b>6 次</b>。"},

{sec:"7.5",type:"single",q:"存货平均销售天数的算法是：",
opts:["365 ÷ 存货周转率","存货周转率 ÷ 365","平均存货 ÷ 365","365 × 存货周转率"],ans:[0],
exp:"<b>存货平均周转天数 = 365 ÷ 存货周转率</b>。天数越低，交付越快、越好。"},

{sec:"7.5",type:"single",q:"“LIFO 准备”的定义是：",
opts:["FIFO 存货 − LIFO 存货","LIFO 存货 − FIFO 存货","期初存货 − 期末存货","销售成本 − 采购"],ans:[0],
exp:"<b>LIFO 准备 = FIFO 存货 − LIFO 存货</b>（即 FIFO 超出 LIFO 的金额）。且：期初 LIFO 准备 − 期末 LIFO 准备 = 销售成本差异。"},

{sec:"7.5",type:"single",q:"分析师要把一家用 LIFO 的美国上市公司与用 FIFO 的公司比较，可如何转换？",
opts:["无法转换","用附注披露的 FIFO 金额，或把 LIFO 准备加回 LIFO 报表","直接相减忽略差异","改用现金流量表"],ans:[1],
exp:"采用 LIFO 的美国上市公司若与 FIFO 差异显著，需在<b>附注披露</b> FIFO 下的期初/期末存货。可直接用附注 FIFO 金额，或<b>把 LIFO 准备加到 LIFO 报表上</b>转换为 FIFO。"},

{sec:"7.5",type:"single",q:"间接法下，存货出现“净增加”时，对经营活动现金流应：",
opts:["加回该增加额","扣除该增加额","不调整","计入投资活动"],ans:[1],
exp:"存货净增加→采购量>销售量→占用现金→经营现金流中<b>扣除</b>增加额；存货净减少则<b>加回</b>。"},

{sec:"7.5",type:"single",q:"间接法下，应付账款出现“净增加”时，对经营活动现金流应：",
opts:["扣除该增加额","加回该增加额","不调整","计入筹资活动"],ans:[1],
exp:"应付账款净增加→赊购>付现→少付现金→<b>加回</b>增加额；应付账款净减少则<b>扣除</b>。"},

{sec:"7.5",type:"single",q:"关于 LIFO/FIFO 在永续制与定期制下销售成本是否相同：",
opts:["FIFO 两制相同，LIFO 两制不同","FIFO 两制不同，LIFO 两制相同","两者都相同","两者都不同"],ans:[0],
exp:"<b>FIFO</b>：永续与定期下销售成本<b>相同</b>（始终优先结转最早成本）。<b>LIFO</b>：两制<b>不同</b>（实时 vs 期末批量结转，物价上涨时定期 LIFO 成本更高）。"}
];

/* ============ 本地存储 ============ */
const STORE_KEY="kuaiji7_v1";
function loadStore(){try{const s=JSON.parse(localStorage.getItem(STORE_KEY));return (s&&s.sec)?s:{sec:{},wrong:[]};}catch(e){return {sec:{},wrong:[]};}}
function saveStore(s){try{localStorage.setItem(STORE_KEY,JSON.stringify(s));}catch(e){}}
const norm=s=>(s||"").toString().trim().replace(/[，,\s$＄]/g,"").replace(/＋/g,"+").replace(/[−－]/g,"-").replace(/[（）]/g,"").toLowerCase();

/* ============ 逻辑 ============ */
const app=document.getElementById('app');
const foot=document.getElementById('foot');
Q.forEach((q,i)=>q.id=i);
document.getElementById('totalQ').textContent=Q.length;

let pool=[],idx=0,score=0,wrong=[],picks=[],curMode='',sessRight=[],sessWrong=[];

function counts(){const c={};Q.forEach(q=>c[q.sec]=(c[q.sec]||0)+1);return c;}

function renderStart(){
  foot.classList.remove('hidden');
  const c=counts(), store=loadStore();
  let html='<div class="card"><p class="lead">点一个章节开始刷题。每答完一题立即出对错和解析——<b>错题自动进错题本</b>，下次打开仍在。计算题与表格填空都已并入。</p><div class="sec-list">';
  html+=`<button class="sec-btn all-btn" data-sec="ALL"><span class="sec-no">全</span><span class="sec-meta"><span class="sec-title">全章随机刷（${Q.length}题）</span><span class="sec-desc">打乱顺序，模拟考试</span></span><span class="sec-right"><span class="sec-count">${Q.length}</span></span></button>`;
  for(const s in SECTIONS){
    const b=store.sec[s]&&typeof store.sec[s].best==='number'?`<span class="sec-badge">最佳 ${store.sec[s].best}%</span>`:'';
    html+=`<button class="sec-btn" data-sec="${s}"><span class="sec-no">${s}</span><span class="sec-meta"><span class="sec-title">${SECTIONS[s]}</span><span class="sec-desc">${SEC_DESC[s]||''}</span></span><span class="sec-right"><span class="sec-count">${c[s]||0}题</span>${b}</span></button>`;
  }
  if(store.wrong&&store.wrong.length){
    html+=`<button class="sec-btn wrong-btn" data-sec="SAVED_WRONG"><span class="sec-no">错</span><span class="sec-meta"><span class="sec-title">错题本（${store.wrong.length}题）</span><span class="sec-desc">只刷做错过的题，答对后自动移出</span></span><span class="sec-right"><span class="sec-count">${store.wrong.length}</span></span></button>`;
  }
  html+='</div><button class="reset-link" id="resetBtn">清空本机所有记录</button></div>';
  app.innerHTML=html;
  app.querySelectorAll('.sec-btn').forEach(b=>b.onclick=()=>start(b.dataset.sec));
  const rb=document.getElementById('resetBtn');
  rb.onclick=()=>{ if(confirm('确定清空本机所有做题记录（最佳成绩+错题本）吗？不可恢复。')){ saveStore({sec:{},wrong:[]}); renderStart(); } };
}

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function start(sec){
  curMode=sec;
  if(sec==='ALL') pool=shuffle(Q);
  else if(sec==='WRONG') pool=wrong.slice();
  else if(sec==='SAVED_WRONG'){const w=loadStore().wrong||[];pool=shuffle(Q.filter(q=>w.includes(q.id)));}
  else pool=shuffle(Q.filter(q=>q.sec===sec));
  if(!pool.length){renderStart();return;}
  idx=0;score=0;wrong=[];sessRight=[];sessWrong=[];
  foot.classList.add('hidden');
  renderQ();
}

function typeTag(t){
  if(t==='multi')return '<span class="tag multi">多选</span>';
  if(t==='judge')return '<span class="tag judge">判断</span>';
  if(t==='calc')return '<span class="tag calc">计算</span>';
  if(t==='table')return '<span class="tag fill">表格填空</span>';
  return '<span class="tag">单选</span>';
}

function frame(inner){
  const pct=Math.round(idx/pool.length*100);
  return `
    <div class="topbar">
      <span class="pill">第 <b>${idx+1}</b> / ${pool.length} 题</span>
      <span class="pill">✓ <b>${score}</b></span>
      <button class="quit" id="quitBtn">退出</button>
    </div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="card">${inner}</div>`;
}

function renderQ(){
  const q=pool[idx];picks=[];
  if(q.type==='table'){return renderTable(q);}
  const letters=['A','B','C','D','E','F'];
  let opts='';
  q.opts.forEach((o,i)=>{opts+=`<button class="opt" data-i="${i}"><span class="mk">${letters[i]}</span><span class="otext">${o}</span></button>`;});
  const isMulti=q.type==='multi';
  app.innerHTML=frame(`
      <div class="qhead">${typeTag(q.type)}<span class="secref">§${q.sec} ${SECTIONS[q.sec]}</span></div>
      <div class="qtext">${q.q}</div>
      <div class="opts" id="opts">${opts}</div>
      <div class="fb" id="fb"></div>
      <button class="btn" id="confirm" ${isMulti?'disabled':''} style="${isMulti?'':'display:none'}">确认作答</button>
      <button class="btn hidden" id="next">${idx+1<pool.length?'下一题 →':'查看结果'}</button>`);
  document.getElementById('quitBtn').onclick=renderStart;
  [...app.querySelectorAll('.opt')].forEach(el=>el.onclick=()=>{
    if(el.classList.contains('locked'))return;
    const i=+el.dataset.i;
    if(isMulti){
      if(picks.includes(i)){picks=picks.filter(x=>x!==i);el.classList.remove('sel');}
      else{picks.push(i);el.classList.add('sel');}
      document.getElementById('confirm').disabled=picks.length===0;
    }else{picks=[i];grade();}
  });
  if(isMulti)document.getElementById('confirm').onclick=grade;
}

function renderTable(q){
  let thead='<tr>'+q.headers.map(h=>`<th>${h}</th>`).join('')+'</tr>';
  let body='';
  q.rows.forEach((r,ri)=>{
    body+='<tr>';
    r.forEach((cell,ci)=>{
      if(cell&&typeof cell==='object'){body+=`<td><input class="tin" data-r="${ri}" data-c="${ci}" placeholder="?" inputmode="text"></td>`;}
      else body+=`<td>${cell}</td>`;
    });
    body+='</tr>';
  });
  app.innerHTML=frame(`
      <div class="qhead">${typeTag(q.type)}<span class="secref">§${q.sec} ${SECTIONS[q.sec]}</span></div>
      <div class="qtext">${q.q}</div>
      <div class="tablewrap"><table class="qtable"><thead>${thead}</thead><tbody>${body}</tbody></table></div>
      <div class="hint">${q.hint||'填好后点确认。数字可不写逗号/$，文字按括号内任一写法均可。'}</div>
      <div class="fb" id="fb"></div>
      <button class="btn" id="confirm">确认作答</button>
      <button class="btn hidden" id="next">${idx+1<pool.length?'下一题 →':'查看结果'}</button>`);
  document.getElementById('quitBtn').onclick=renderStart;
  document.getElementById('confirm').onclick=gradeTable;
}

function afterGrade(correct){
  const q=pool[idx];
  if(correct){score++;sessRight.push(q.id);} else {wrong.push(q);sessWrong.push(q.id);}
  const nx=document.getElementById('next');nx.classList.remove('hidden');
  nx.onclick=()=>{idx++; idx<pool.length?renderQ():renderResult();};
}

function grade(){
  const q=pool[idx];const letters=['A','B','C','D','E','F'];
  const correct=q.ans.slice().sort().join(',')===picks.slice().sort().join(',');
  app.querySelectorAll('.opt').forEach(el=>{
    const i=+el.dataset.i;el.classList.add('locked');el.classList.remove('sel');
    if(q.ans.includes(i))el.classList.add('correct');
    else if(picks.includes(i))el.classList.add('wrong');
  });
  const fb=document.getElementById('fb');
  const ansStr=q.ans.map(i=>letters[i]).join('、');
  fb.className='fb show '+(correct?'ok':'no');
  fb.innerHTML=`<div class="verdict">${correct?'✓ 答对了':'✗ 答错了'}<span class="ans">　正确答案：${ansStr}</span></div><div class="exp">${q.exp}</div>`;
  const cf=document.getElementById('confirm');if(cf)cf.style.display='none';
  afterGrade(correct);
  fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function gradeTable(){
  const q=pool[idx];let allok=true;
  q.rows.forEach((r,ri)=>r.forEach((cell,ci)=>{
    if(cell&&typeof cell==='object'){
      const el=app.querySelector(`.tin[data-r="${ri}"][data-c="${ci}"]`);
      const got=norm(el.value);
      const ok=cell.a.some(a=>norm(a)===got);
      el.disabled=true;el.classList.add(ok?'tok':'tno');
      if(!ok){allok=false;el.value=cell.a[0];}
    }
  }));
  const fb=document.getElementById('fb');
  fb.className='fb show '+(allok?'ok':'no');
  fb.innerHTML=`<div class="verdict">${allok?'✓ 全部正确':'✗ 有空填错了（已用绿/红标出，错处已填上正确答案）'}</div><div class="exp">${q.exp}</div>`;
  document.getElementById('confirm').style.display='none';
  afterGrade(allok);
  fb.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function persist(){
  const store=loadStore();
  const total=pool.length, pct=Math.round(score/total*100);
  if(/^\d/.test(curMode)){ // 单章模式才记最佳成绩
    const prev=store.sec[curMode]&&store.sec[curMode].best||0;
    store.sec[curMode]={best:Math.max(prev,pct)};
  }
  const w=new Set(store.wrong||[]);
  sessRight.forEach(id=>w.delete(id));
  sessWrong.forEach(id=>w.add(id));
  store.wrong=[...w];
  saveStore(store);
}

function renderResult(){
  persist();
  const total=pool.length, pct=Math.round(score/total*100);
  let verdict;
  if(pct>=90)verdict='稳了，这部分基本拿下 ✦';
  else if(pct>=75)verdict='不错，把错题再过一遍就很扎实了';
  else if(pct>=60)verdict='及格线上，错题别放过，重点补一补';
  else verdict='概念还没串起来，建议对着错题回去翻书再刷一轮';
  let html=`<div class="card">
      <div class="score-num">${score}<span> / ${total}</span></div>
      <div class="score-label">正确率 ${pct}%</div>
      <div class="verdict-line">${verdict}</div>`;
  if(wrong.length)html+=`<button class="btn" id="redoWrong">立刻重刷本轮错题（${wrong.length}）</button>`;
  html+=`<button class="btn ghost" id="backHome">返回章节选择</button>`;
  if(wrong.length){
    html+=`<div class="review-h">错题回顾 · ${wrong.length} 题</div>`;
    const letters=['A','B','C','D','E','F'];
    wrong.forEach(q=>{
      let ansLine;
      if(q.type==='table'){ansLine='见下方解析中的正确填法';}
      else ansLine=q.ans.map(i=>letters[i]+'. '+q.opts[i]).join('；');
      html+=`<div class="rev-item"><div class="rev-q">${typeTag(q.type)} ${q.q}</div><div class="rev-line"><span class="c">正确：${ansLine}</span></div><div class="rev-exp">${q.exp}</div></div>`;
    });
  }
  html+=`</div>`;
  app.innerHTML=html;
  const rw=document.getElementById('redoWrong');if(rw)rw.onclick=()=>start('WRONG');
  document.getElementById('backHome').onclick=renderStart;
  window.scrollTo({top:0,behavior:'smooth'});
}

renderStart();
</script>
</body>
</html>
