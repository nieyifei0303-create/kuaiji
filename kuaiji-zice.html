<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会计学 · 自测账簿</title>
<style>
  :root{
    --paper:#F6F3EB;
    --paper-2:#FBF9F3;
    --ink:#1B3A4B;          /* 账本墨色 */
    --ink-soft:#46606C;
    --rule:#D9D1BE;         /* 账簿横线 */
    --rule-strong:#B9AE94;
    --green:#2E6B4F;        /* 平账·正确 */
    --green-bg:#E7F0E8;
    --red:#A4392B;          /* 红字更正·错误 */
    --red-bg:#F5E6E2;
    --debit:#EDF1F4;        /* 借方栏底色 */
    --shadow:0 1px 0 var(--rule), 0 12px 30px -22px rgba(27,58,75,.5);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    line-height:1.6;
    font-size:16px;
  }
  .num{font-family:ui-monospace,"SF Mono","Roboto Mono","Courier New",monospace;font-variant-numeric:tabular-nums;}
  .wrap{max-width:760px;margin:0 auto;padding:24px 18px 80px;}

  /* ---------- 抬头：仿账簿账户标题 ---------- */
  header.book{
    border:1.5px solid var(--ink);
    background:var(--paper-2);
    border-radius:4px;
    padding:20px 22px 16px;
    box-shadow:var(--shadow);
  }
  .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-soft);}
  header.book h1{
    font-family:Georgia,"Times New Roman","Songti SC",serif;
    font-size:30px;letter-spacing:.04em;margin:.2em 0 .1em;font-weight:700;
  }
  header.book .sub{color:var(--ink-soft);font-size:14px;}
  .ledger-rule{border:none;border-top:1px solid var(--ink);border-bottom:3px double var(--ink);height:4px;margin:14px 0 0;}

  /* ---------- 结余 / 进度面板 ---------- */
  .balance{
    display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;
  }
  .balance .cell{
    flex:1 1 120px;min-width:120px;border:1px solid var(--rule-strong);border-radius:4px;
    padding:8px 12px;background:var(--debit);
  }
  .balance .cell .k{font-size:11px;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase;}
  .balance .cell .v{font-size:22px;font-weight:700;}
  .balance .cell .v small{font-size:13px;color:var(--ink-soft);font-weight:400;}

  /* ---------- 选项卡 ---------- */
  nav.tabs{display:flex;gap:6px;margin:22px 0 6px;flex-wrap:wrap;}
  nav.tabs button{
    font:inherit;cursor:pointer;border:1px solid var(--rule-strong);
    background:transparent;color:var(--ink-soft);padding:9px 14px;border-radius:999px;
    font-size:14px;transition:background .15s,color .15s,border-color .15s;
  }
  nav.tabs button[aria-selected="true"]{
    background:var(--ink);color:var(--paper-2);border-color:var(--ink);font-weight:600;
  }
  nav.tabs button:focus-visible{outline:3px solid var(--green);outline-offset:2px;}

  .panel{display:none;}
  .panel.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .section-hd{margin:26px 0 6px;}
  .section-hd h2{font-family:Georgia,"Songti SC",serif;font-size:20px;margin:0;}
  .section-hd .double{border-bottom:3px double var(--rule-strong);padding-bottom:8px;}
  .hint{color:var(--ink-soft);font-size:13px;margin:4px 0 0;}

  /* ---------- 题卡 ---------- */
  .card{
    background:var(--paper-2);border:1px solid var(--rule-strong);border-radius:5px;
    padding:18px 18px 16px;margin:16px 0;box-shadow:var(--shadow);
  }
  .qnum{font-size:12px;letter-spacing:.22em;color:var(--ink-soft);text-transform:uppercase;}
  .qtext{margin:6px 0 14px;font-size:16.5px;}
  .qtext .num{font-weight:600;}

  .opts{display:flex;flex-direction:column;gap:8px;}
  .opt{
    text-align:left;font:inherit;cursor:pointer;border:1px solid var(--rule-strong);
    background:var(--paper);border-radius:4px;padding:11px 14px;display:flex;gap:10px;align-items:baseline;
    transition:background .12s,border-color .12s;
  }
  .opt:hover:not(:disabled){background:var(--debit);}
  .opt:focus-visible{outline:3px solid var(--green);outline-offset:2px;}
  .opt .tag{font-weight:700;color:var(--ink-soft);min-width:1.2em;}
  .opt:disabled{cursor:default;}
  .opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green);font-weight:600;text-decoration:underline;text-underline-offset:3px;}
  .opt.wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);text-decoration:line-through;text-decoration-color:var(--red);}
  .opt.correct .tag{color:var(--green);}
  .opt.wrong .tag{color:var(--red);}

  .explain{
    margin-top:12px;border-left:3px solid var(--ink);background:var(--debit);
    padding:10px 14px;border-radius:0 4px 4px 0;font-size:14.5px;display:none;
  }
  .explain.show{display:block;}
  .explain b{color:var(--ink);}
  .explain .formula{font-family:ui-monospace,"SF Mono",monospace;font-size:13.5px;color:var(--ink-soft);display:block;margin-top:4px;}

  /* ---------- 大题 ---------- */
  .given{border:1px solid var(--rule-strong);border-radius:4px;overflow:hidden;margin:6px 0 16px;}
  .given .gh{background:var(--ink);color:var(--paper-2);font-size:12px;letter-spacing:.18em;padding:6px 12px;text-transform:uppercase;}
  table.gt{width:100%;border-collapse:collapse;font-size:14.5px;}
  table.gt td{padding:7px 12px;border-bottom:1px solid var(--rule);}
  table.gt tr:last-child td{border-bottom:none;}
  table.gt td:last-child{text-align:right;font-family:ui-monospace,"SF Mono",monospace;font-variant-numeric:tabular-nums;}
  table.gt tr:nth-child(even){background:rgba(217,209,190,.18);}

  .sub{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 0;border-bottom:1px dotted var(--rule);}
  .sub:last-of-type{border-bottom:none;}
  .sub .lab{flex:1 1 230px;font-size:15px;}
  .sub .lab .idx{font-weight:700;color:var(--ink-soft);margin-right:6px;}
  .sub input{
    width:120px;font:inherit;font-family:ui-monospace,"SF Mono",monospace;
    padding:8px 10px;border:1px solid var(--rule-strong);border-radius:4px;background:var(--paper);
    text-align:right;
  }
  .sub input:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(27,58,75,.12);}
  .sub input.ok{border-color:var(--green);background:var(--green-bg);color:var(--green);}
  .sub input.no{border-color:var(--red);background:var(--red-bg);color:var(--red);}
  .sub .mark{min-width:22px;font-weight:700;font-size:18px;text-align:center;}
  .sub .unit{color:var(--ink-soft);font-size:13px;min-width:40px;}

  .btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
  button.act{
    font:inherit;cursor:pointer;border-radius:4px;padding:10px 18px;font-size:14.5px;font-weight:600;
    border:1px solid var(--ink);background:var(--ink);color:var(--paper-2);transition:opacity .15s;
  }
  button.act.ghost{background:transparent;color:var(--ink);}
  button.act:hover{opacity:.88;}
  button.act:focus-visible{outline:3px solid var(--green);outline-offset:2px;}

  .solution{
    display:none;margin-top:14px;border:1px dashed var(--rule-strong);border-radius:4px;
    padding:14px 16px;background:var(--debit);font-size:14px;
  }
  .solution.show{display:block;}
  .solution h4{margin:0 0 8px;font-family:Georgia,"Songti SC",serif;font-size:15px;}
  .solution .je{font-family:ui-monospace,"SF Mono",monospace;font-size:13px;white-space:pre-wrap;background:var(--paper-2);border:1px solid var(--rule);border-radius:4px;padding:10px 12px;margin:8px 0;}
  .solution ol{margin:6px 0 0;padding-left:20px;}
  .solution li{margin:3px 0;}
  .solution code{font-family:ui-monospace,"SF Mono",monospace;color:var(--ink);}

  footer{margin-top:34px;text-align:center;color:var(--ink-soft);font-size:12.5px;}
  footer .reset{margin-bottom:10px;}

  @media (max-width:480px){
    header.book h1{font-size:25px;}
    .wrap{padding:18px 14px 70px;}
    .sub .lab{flex-basis:100%;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="book">
    <div class="eyebrow">Financial Accounting · Self-Test</div>
    <h1>会计学 · 自测账簿</h1>
    <div class="sub">损益表结构 · 财务比率 · 会计循环（分录 → 试算 → 比率）</div>
    <hr class="ledger-rule">
    <div class="balance">
      <div class="cell"><div class="k">单选 已答</div><div class="v"><span id="mcDone" class="num">0</span><small> / <span id="mcTotal" class="num">0</span></small></div></div>
      <div class="cell"><div class="k">单选 正确</div><div class="v"><span id="mcRight" class="num">0</span></div></div>
      <div class="cell"><div class="k">正确率</div><div class="v"><span id="mcRate" class="num">—</span></div></div>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button role="tab" aria-selected="true"  data-tab="t1">单选计算题</button>
    <button role="tab" aria-selected="false" data-tab="t2">计算大题</button>
    <button role="tab" aria-selected="false" data-tab="t3">分录 · 试算 · 比率</button>
  </nav>

  <!-- 单选 -->
  <section id="t1" class="panel active" role="tabpanel">
    <div class="section-hd"><h2 class="double">单选计算题</h2><p class="hint">选定后即批改并展开解析（解析中才给出公式）。共 <span id="mcN" class="num">0</span> 题。</p></div>
    <div id="mcList"></div>
  </section>

  <!-- 大题 -->
  <section id="t2" class="panel" role="tabpanel">
    <div class="section-hd"><h2 class="double">计算大题</h2><p class="hint">逐空填入数字 → 点「核对本题」批改 → 需要时再展开完整解答。百分比可填 <span class="num">40</span> 或 <span class="num">0.4</span>。</p></div>
    <div id="bigList"></div>
  </section>

  <!-- 分录综合 -->
  <section id="t3" class="panel" role="tabpanel">
    <div class="section-hd"><h2 class="double">会计循环综合题</h2><p class="hint">由交易自行推算各账户余额、验证试算平衡，再算出比率。借贷分录在解答里核对。</p></div>
    <div id="cycleList"></div>
  </section>

  <footer>
    <div class="reset"><button class="act ghost" id="resetBtn">重置全部作答</button></div>
    为 2028 届经济学 · 财务会计期末自测而作 · 单文件，可直接放进 GitHub Pages 仓库
  </footer>
</div>

<script>
/* ============ 题库数据 ============ */
const MC = [
  { q:'某公司本年销售收入 <span class="num">¥640,000</span>，销售成本 <span class="num">¥400,000</span>。其毛利润为？',
    opts:['¥240,000','¥1,040,000','¥400,000','¥160,000'], correct:0,
    ex:'毛利润 = 销售收入 − 销售成本。', f:'640,000 − 400,000 = 240,000' },

  { q:'毛利润 <span class="num">¥240,000</span>，运营费用（工资、租金、广告等）<span class="num">¥150,000</span>。运营净收入为？',
    opts:['¥90,000','¥390,000','¥240,000','¥150,000'], correct:0,
    ex:'运营净收入 = 毛利润 − 运营费用。', f:'240,000 − 150,000 = 90,000' },

  { q:'运营净收入 <span class="num">¥90,000</span>，利息费用 <span class="num">¥10,000</span>，所得税税率 <span class="num">25%</span>。净利润为？',
    opts:['¥60,000','¥67,500','¥80,000','¥52,500'], correct:0,
    ex:'先减利息得税前利润，再扣所得税得净利润。', f:'EBT = 90,000 − 10,000 = 80,000；税 = 80,000×25% = 20,000；净利 = 60,000' },

  { q:'期末流动资产 <span class="num">¥360,000</span>，流动负债 <span class="num">¥150,000</span>。该公司流动比率约为？',
    opts:['2.4','0.42','1.4','4.2'], correct:0,
    ex:'流动比率 = 流动资产 / 流动负债，衡量短期偿债能力。', f:'360,000 / 150,000 = 2.4' },

  { q:'净销售额 <span class="num">¥800,000</span>，销售成本 <span class="num">¥520,000</span>。毛利率约为？',
    opts:['35%','65%','53.8%','28%'], correct:0,
    ex:'毛利率 = (净销售额 − 销售成本) / 净销售额。', f:'(800,000 − 520,000) / 800,000 = 280,000 / 800,000 = 35%' },

  { q:'净利润 <span class="num">¥90,000</span>；年初资产总额 <span class="num">¥550,000</span>，年末 <span class="num">¥650,000</span>。资产收益率(ROA)约为？',
    opts:['15%','13.8%','16.4%','7.5%'], correct:0,
    ex:'ROA = 净利润 / 平均资产总额；平均数 = (期初+期末)/2。', f:'平均资产 = (550,000+650,000)/2 = 600,000；ROA = 90,000/600,000 = 15%' },

  { q:'净销售额 <span class="num">¥960,000</span>，应收账款净额期初 <span class="num">¥100,000</span>、期末 <span class="num">¥140,000</span>。应收账款周转率约为？',
    opts:['8 次','6.86 次','9.6 次','0.125 次'], correct:0,
    ex:'应收账款周转率 = 净销售额 / 平均应收账款净额。', f:'平均 = (100,000+140,000)/2 = 120,000；960,000/120,000 = 8' },

  { q:'销售成本 <span class="num">¥600,000</span>，存货期初 <span class="num">¥120,000</span>、期末 <span class="num">¥180,000</span>。存货周转率约为？',
    opts:['4 次','3.33 次','5 次','0.25 次'], correct:0,
    ex:'存货周转率分子用销售成本（不是销售收入），分母为平均存货。', f:'平均存货 = (120,000+180,000)/2 = 150,000；600,000/150,000 = 4' },

  { q:'营业收入 <span class="num">¥1,200,000</span>，固定资产净额期初 <span class="num">¥450,000</span>、期末 <span class="num">¥550,000</span>。固定资产周转率约为？',
    opts:['2.4 次','2.18 次','2.67 次','0.42 次'], correct:0,
    ex:'固定资产周转率 = 营业收入 / 平均固定资产净额。', f:'平均 = (450,000+550,000)/2 = 500,000；1,200,000/500,000 = 2.4' },

  { q:'经营活动现金流量 <span class="num">¥150,000</span>，净利润 <span class="num">¥120,000</span>。收入质量比率为？',
    opts:['1.25','0.8','1.5','1.2'], correct:0,
    ex:'收入质量比率 = 经营活动现金流 / 净利润；>1 表示净利润有现金支撑，盈利质量较好。', f:'150,000 / 120,000 = 1.25' },

  { q:'经营活动现金流量 <span class="num">¥200,000</span>，本年购置厂房设备(PP&E)支付现金 <span class="num">¥125,000</span>。资本收购比率为？',
    opts:['1.6','0.625','1.5','2.5'], correct:0,
    ex:'资本收购比率 = 经营活动现金流 / 购置固定资产所付现金；>1 说明经营现金流足以自筹资本支出。', f:'200,000 / 125,000 = 1.6' },

  { q:'某公司净利率为 <span class="num">8%</span>，总资产周转率为 <span class="num">1.5</span>。其资产收益率(ROA)为？',
    opts:['12%','5.33%','9.5%','0.12%'], correct:0,
    ex:'杜邦分解：ROA = 净利率 × 总资产周转率。前者反映经营效率，后者反映资产使用效率。', f:'8% × 1.5 = 12%' },

  { q:'净销售额 <span class="num">¥1,000,000</span>，净利润 <span class="num">¥80,000</span>，平均资产总额 <span class="num">¥500,000</span>。下列分解正确的是？',
    opts:['净利率 8% × 周转率 2.0 = ROA 16%','净利率 8% × 周转率 0.5 = 4%','净利率 12.5% × 周转率 1.6 = 20%','净利率 16% × 周转率 1.0 = 16%'], correct:0,
    ex:'净利率 = 净利润/净销售额；周转率 = 净销售额/平均资产；两者相乘即 ROA = 净利润/平均资产。', f:'净利率 = 80,000/1,000,000 = 8%；周转率 = 1,000,000/500,000 = 2.0；ROA = 16%' },

  { q:'甲公司净利率 <span class="num">5%</span>、总资产周转率 <span class="num">3.0</span>；乙公司净利率 <span class="num">15%</span>、总资产周转率 <span class="num">1.0</span>。下列判断最合理的是？',
    opts:['两家 ROA 相同(均 15%)，甲偏低成本·高周转策略，乙偏差异化·高毛利策略','乙公司 ROA 更高，因净利率更高','甲公司 ROA 更高，因周转率更高','两家盈利能力无法比较'], correct:0,
    ex:'ROA = 净利率 × 周转率，两家都 = 15%。甲靠高资产周转（低成本策略），乙靠高净利率（产品差异化策略）——正是教材的两类制造商战略。', f:'5%×3.0 = 15% ＝ 15%×1.0' },
];

const BIG = [
  {
    title:'大题一 · 编制损益表并计算盈利比率',
    given:[
      ['销售收入（即净销售额）','1,500,000'],
      ['销售成本','900,000'],
      ['运营费用','360,000'],
      ['利息费用','40,000'],
      ['所得税税率','25%'],
    ],
    subs:[
      {lab:'毛利润', unit:'¥', ans:600000, type:'num'},
      {lab:'运营净收入', unit:'¥', ans:240000, type:'num'},
      {lab:'税前利润', unit:'¥', ans:200000, type:'num'},
      {lab:'所得税费用', unit:'¥', ans:50000, type:'num'},
      {lab:'净利润', unit:'¥', ans:150000, type:'num'},
      {lab:'毛利率', unit:'%', ans:0.40, type:'pct'},
      {lab:'净利率', unit:'%', ans:0.10, type:'pct'},
    ],
    sol:`<h4>分步解答</h4><ol>
      <li>毛利润 = 销售收入 − 销售成本 = <code>1,500,000 − 900,000 = 600,000</code></li>
      <li>运营净收入 = 毛利润 − 运营费用 = <code>600,000 − 360,000 = 240,000</code></li>
      <li>税前利润 = 运营净收入 − 利息费用 = <code>240,000 − 40,000 = 200,000</code></li>
      <li>所得税 = 税前利润 × 25% = <code>200,000 × 0.25 = 50,000</code></li>
      <li>净利润 = 税前利润 − 所得税 = <code>200,000 − 50,000 = 150,000</code></li>
      <li>毛利率 = 毛利润 / 净销售额 = <code>600,000 / 1,500,000 = 40%</code></li>
      <li>净利率 = 净利润 / 净销售额 = <code>150,000 / 1,500,000 = 10%</code></li>
    </ol>`
  },
  {
    title:'大题二 · 财务比率综合分析',
    given:[
      ['净销售额','2,000,000'],
      ['销售成本','1,200,000'],
      ['净利润','180,000'],
      ['经营活动现金流量','240,000'],
      ['应收账款净额（期初 / 期末）','220,000 / 180,000'],
      ['存货（期初 / 期末）','280,000 / 320,000'],
      ['固定资产净额（期初 / 期末）','760,000 / 840,000'],
      ['资产总额（期初 / 期末）','1,150,000 / 1,250,000'],
    ],
    subs:[
      {lab:'应收账款周转率', unit:'次', ans:10, type:'num', tol:0.05},
      {lab:'存货周转率', unit:'次', ans:4, type:'num', tol:0.05},
      {lab:'固定资产周转率', unit:'次', ans:2.5, type:'num', tol:0.05},
      {lab:'资产收益率 ROA', unit:'%', ans:0.15, type:'pct'},

    sol:`<h4>分步解答（先求各项平均数）</h4><ol>
      <li>平均应收账款 = (220,000+180,000)/2 = 200,000 → 周转率 = <code>2,000,000 / 200,000 = 10 次</code></li>
      <li>平均存货 = (280,000+320,000)/2 = 300,000 → 周转率 = <code>1,200,000 / 300,000 = 4 次</code>（分子用销售成本）</li>
      <li>平均固定资产 = (760,000+840,000)/2 = 800,000 → 周转率 = <code>2,000,000 / 800,000 = 2.5 次</code></li>
      <li>平均资产总额 = (1,150,000+1,250,000)/2 = 1,200,000 → ROA = <code>180,000 / 1,200,000 = 15%</code></li>
      <li>收入质量比率 = 经营现金流 / 净利润 = <code>240,000 / 180,000 ≈ 1.33</code></li>

];

/* ============ 工具 ============ */
function parseInput(raw, type){
  if(raw==null) return NaN;
  let s = String(raw).replace(/[,，\s¥￥%／/]/g,'').trim();
  if(s==='') return NaN;
  let n = parseFloat(s);
  if(isNaN(n)) return NaN;
  if(type==='pct' && n>1.5) n = n/100;   // 用户填 40 → 0.40
  return n;
}
function tolFor(sub){
  if(sub.tol!=null) return sub.tol;
  if(sub.type==='pct') return 0.005;
  if(sub.type==='ratio') return 0.03;
  return 1;          // 金额按四舍五入容差 1
}

/* ============ 渲染 单选 ============ */
const mcList = document.getElementById('mcList');
let mcDone=0, mcRight=0;
MC.forEach((item, qi)=>{
  const card = document.createElement('div'); card.className='card';
  const letters=['A','B','C','D','E'];
  card.innerHTML = `<div class="qnum">题 ${String(qi+1).padStart(2,'0')}</div>
    <div class="qtext">${item.q}</div>
    <div class="opts"></div>
    <div class="explain"><b>解析：</b>${item.ex}<span class="formula">${item.f}</span></div>`;
  const opts = card.querySelector('.opts');
  item.opts.forEach((o, oi)=>{
    const b=document.createElement('button');
    b.className='opt'; b.type='button';
    b.innerHTML=`<span class="tag">${letters[oi]}</span><span>${o}</span>`;
    b.addEventListener('click', ()=>{
      if(card.dataset.answered) return;
      card.dataset.answered='1';
      opts.querySelectorAll('.opt').forEach(x=>x.disabled=true);
      const correctIdx=item.correct;
      opts.children[correctIdx].classList.add('correct');
      if(oi!==correctIdx) b.classList.add('wrong'); else mcRight++;
      mcDone++;
      card.querySelector('.explain').classList.add('show');
      updateScore();
    });
    opts.appendChild(b);
  });
  mcList.appendChild(card);
});
document.getElementById('mcTotal').textContent=MC.length;
document.getElementById('mcN').textContent=MC.length;

function updateScore(){
  document.getElementById('mcDone').textContent=mcDone;
  document.getElementById('mcRight').textContent=mcRight;
  document.getElementById('mcRate').textContent = mcDone? Math.round(mcRight/mcDone*100)+'%' : '—';
}

/* ============ 渲染 大题 / 综合题 ============ */
function renderBig(container, data){
  data.forEach((p, pi)=>{
    const card=document.createElement('div'); card.className='card';
    let givenRows = p.given.map(g=>`<tr><td>${g[0]}</td><td>${g[1]}</td></tr>`).join('');
    card.innerHTML = `<div class="qnum">${p.title}</div>
      ${p.intro?`<p class="qtext" style="margin-bottom:8px">${p.intro}</p>`:''}
      <div class="given"><div class="gh">已知资料</div><table class="gt"><tbody>${givenRows}</tbody></table></div>
      <div class="subs"></div>
      <div class="btnrow">
        <button class="act check" type="button">核对本题</button>
        <button class="act ghost solBtn" type="button">查看完整解答</button>
      </div>
      <div class="solution">${p.sol}</div>`;
    const subsBox=card.querySelector('.subs');
    p.subs.forEach((s, si)=>{
      const row=document.createElement('div'); row.className='sub';
      row.innerHTML=`<div class="lab"><span class="idx">(${si+1})</span>${s.lab}</div>
        <input type="text" inputmode="decimal" aria-label="${s.lab}" autocomplete="off">
        <span class="unit">${s.unit||''}</span>
        <span class="mark"></span>`;
      subsBox.appendChild(row);
    });
    card.querySelector('.check').addEventListener('click', ()=>{
      const rows=subsBox.querySelectorAll('.sub');
      rows.forEach((row, si)=>{
        const s=p.subs[si];
        const inp=row.querySelector('input');
        const mark=row.querySelector('.mark');
        const val=parseInput(inp.value, s.type);
        inp.classList.remove('ok','no');
        if(isNaN(val)){ mark.textContent='–'; mark.style.color='var(--ink-soft)'; return; }
        const ok = Math.abs(val - s.ans) <= tolFor(s);
        if(ok){ inp.classList.add('ok'); mark.textContent='✓'; mark.style.color='var(--green)'; }
        else { inp.classList.add('no'); mark.textContent='✕'; mark.style.color='var(--red)'; }
      });
    });
    const sol=card.querySelector('.solution');
    card.querySelector('.solBtn').addEventListener('click', (e)=>{
      sol.classList.toggle('show');
      e.target.textContent = sol.classList.contains('show')?'收起解答':'查看完整解答';
    });
    container.appendChild(card);
  });
}
renderBig(document.getElementById('bigList'), BIG);
renderBig(document.getElementById('cycleList'), CYCLE);

/* ============ 选项卡 ============ */
const tabBtns=document.querySelectorAll('nav.tabs button');
tabBtns.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tabBtns.forEach(b=>b.setAttribute('aria-selected','false'));
    btn.setAttribute('aria-selected','true');
    document.querySelectorAll('.panel').forEach(pp=>pp.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
    window.scrollTo({top:0, behavior:'smooth'});
  });
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('确定清空所有作答并重新开始？')) return;
  location.reload();
});
