<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会计学 · 第六章刷题 | 销售收入 · 应收款项 · 现金</title>
<style>
  :root{
    --paper:#faf8f2;
    --paper-2:#f3efe4;
    --ink:#1f2a26;
    --ink-soft:#4a564f;
    --green:#0f5c43;
    --green-deep:#0a4632;
    --green-line:#bcd4c8;
    --amber:#c0892a;
    --amber-soft:#f6ecd6;
    --red:#b8442e;
    --red-soft:#f7e3dd;
    --ok:#1a7a52;
    --ok-soft:#dcefe5;
    --rule:#d8d1be;
    --mono:'SF Mono',ui-monospace,'Menlo','Consolas',monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.65;
    font-size:16px;
    padding-bottom:40px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}

  /* header */
  header{
    background:
      repeating-linear-gradient(transparent,transparent 38px,rgba(15,92,67,.06) 38px,rgba(15,92,67,.06) 39px),
      var(--green-deep);
    color:#f3efe4;
    padding:26px 0 22px;
    border-bottom:3px double rgba(243,239,228,.35);
  }
  header .wrap{padding-top:0}
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;letter-spacing:3px;
    color:var(--amber);text-transform:uppercase;
    margin-bottom:6px;
  }
  h1{font-size:24px;margin:0 0 4px;font-weight:800;letter-spacing:.5px}
  .sub{font-size:13.5px;color:#cdddd4;margin:0}

  /* score bar */
  .scorebar{
    position:sticky;top:0;z-index:30;
    background:var(--paper);
    border-bottom:1px solid var(--rule);
    padding:10px 0;
  }
  .scorebar .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .progress{
    flex:1;min-width:140px;height:8px;background:var(--paper-2);
    border-radius:99px;overflow:hidden;border:1px solid var(--rule);
  }
  .progress > i{display:block;height:100%;width:0;background:var(--green);transition:width .3s}
  .stat{font-family:var(--mono);font-size:13px;color:var(--ink-soft);white-space:nowrap}
  .stat b{color:var(--green)}
  .stat .wrongc{color:var(--red)}

  /* section tabs */
  .tabs{display:flex;gap:6px;margin:16px 0 4px;flex-wrap:wrap}
  .tab{
    flex:1;min-width:90px;
    font-family:var(--sans);font-size:13.5px;font-weight:600;
    padding:9px 8px;border:1px solid var(--green-line);
    background:#fff;color:var(--green);border-radius:8px;
    cursor:pointer;text-align:center;transition:all .15s;
  }
  .tab small{display:block;font-family:var(--mono);font-size:11px;color:var(--ink-soft);font-weight:400;margin-top:1px}
  .tab.active{background:var(--green);color:#fff;border-color:var(--green)}
  .tab.active small{color:#cdddd4}

  /* question card */
  .qcard{
    background:#fff;border:1px solid var(--rule);
    border-radius:12px;padding:18px 16px 16px;
    margin:14px 0;box-shadow:0 1px 0 rgba(31,42,38,.04);
  }
  .qhead{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
  .qnum{font-family:var(--mono);font-size:12px;color:#fff;background:var(--green);
    padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap}
  .qtype{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--amber);
    border:1px solid var(--amber);padding:1px 6px;border-radius:4px;white-space:nowrap}
  .qtag{font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-left:auto}
  .qstem{font-size:15.5px;font-weight:600;margin:0 0 12px;line-height:1.6}
  .qstem .fig{font-family:var(--mono);font-weight:700}

  /* options */
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{
    display:flex;gap:10px;align-items:flex-start;
    border:1px solid var(--rule);border-radius:9px;
    padding:10px 12px;cursor:pointer;background:#fff;
    transition:border-color .12s,background .12s;font-size:15px;
  }
  .opt:hover{border-color:var(--green-line)}
  .opt .key{font-family:var(--mono);font-weight:700;color:var(--green);flex:none;width:18px}
  .opt.sel{border-color:var(--green);background:var(--ok-soft)}
  .opt.correct{border-color:var(--ok);background:var(--ok-soft)}
  .opt.correct .key{color:var(--ok)}
  .opt.wrong{border-color:var(--red);background:var(--red-soft)}
  .opt.wrong .key{color:var(--red)}
  .opt.disabled{cursor:default}

  /* fill / table inputs */
  .blankrow{margin:6px 0;font-size:15px}
  input.blank{
    font-family:var(--mono);font-size:15px;
    border:none;border-bottom:2px solid var(--green-line);
    background:var(--paper-2);padding:3px 8px;width:120px;
    border-radius:4px 4px 0 0;color:var(--ink);text-align:center;
  }
  input.blank:focus{outline:none;border-bottom-color:var(--green);background:#fff}
  input.blank.ok{border-bottom-color:var(--ok);background:var(--ok-soft);color:var(--ok);font-weight:700}
  input.blank.no{border-bottom-color:var(--red);background:var(--red-soft);color:var(--red);font-weight:700}

  table.fillt{border-collapse:collapse;width:100%;font-size:13.5px;margin:4px 0}
  table.fillt th,table.fillt td{border:1px solid var(--rule);padding:7px 8px;text-align:center;vertical-align:middle}
  table.fillt th{background:var(--green-deep);color:#f3efe4;font-weight:600;font-size:13px}
  table.fillt td:first-child{text-align:left;font-weight:600;background:var(--paper-2)}
  table.fillt input.blank{width:86px;font-size:13.5px;padding:2px 4px}

  /* journal entry block */
  .jentry{
    font-family:var(--mono);font-size:13.5px;
    background:var(--paper-2);border:1px solid var(--rule);
    border-left:3px solid var(--green);border-radius:6px;
    padding:10px 12px;margin:8px 0;white-space:pre-wrap;line-height:1.9;
  }

  /* buttons */
  .btnrow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
  button.act{
    font-family:var(--sans);font-size:14px;font-weight:600;
    padding:8px 16px;border-radius:8px;cursor:pointer;border:1px solid var(--green);
    background:var(--green);color:#fff;transition:opacity .12s;
  }
  button.act:hover{opacity:.9}
  button.ghost{background:#fff;color:var(--green)}
  button.act:disabled{opacity:.45;cursor:default}

  /* feedback / explanation */
  .fb{margin-top:12px;border-radius:9px;padding:11px 13px;font-size:14px;display:none}
  .fb.show{display:block;animation:fade .2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .fb.right{background:var(--ok-soft);border:1px solid var(--ok)}
  .fb.rong{background:var(--red-soft);border:1px solid var(--red)}
  .fb .verdict{font-weight:800;font-size:14px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .fb.right .verdict{color:var(--ok)}
  .fb.rong .verdict{color:var(--red)}
  .fb .exp{color:var(--ink);line-height:1.7}
  .fb .exp b{color:var(--green-deep)}
  .fb .figans{font-family:var(--mono);background:#fff;border:1px dashed var(--rule);
    padding:6px 9px;border-radius:6px;margin:6px 0;white-space:pre-wrap;line-height:1.8;font-size:13px}

  /* calc reveal */
  .reveal{display:none;margin-top:12px;border-top:1px dashed var(--rule);padding-top:12px}
  .reveal.show{display:block}
  .reveal h4{margin:0 0 6px;font-size:13.5px;color:var(--amber);font-family:var(--mono);letter-spacing:1px}
  .reveal .step{font-size:14px;margin:4px 0;line-height:1.7}
  .reveal .step .fig{font-family:var(--mono);font-weight:700;color:var(--green-deep)}

  .section-hd{margin:30px 0 4px;padding-bottom:6px;border-bottom:2px solid var(--green);
    display:flex;align-items:baseline;gap:10px}
  .section-hd .no{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--green)}
  .section-hd .nm{font-size:18px;font-weight:800}
  .section-hd .cnt{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-left:auto}

  footer{text-align:center;margin-top:34px;font-size:12.5px;color:var(--ink-soft);font-family:var(--mono)}
  .resetbtn{font-family:var(--sans);font-size:12.5px;color:var(--green);background:none;border:none;
    cursor:pointer;text-decoration:underline;margin-top:6px}
  .hidden{display:none!important}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">FINANCIAL ACCOUNTING · CH.6</div>
    <h1>第六章 · 刷题手册</h1>
    <p class="sub">销售收入 · 应收款项 · 现金的报告与保障　|　点击作答，即时反馈带解析</p>
  </div>
</header>

<div class="scorebar">
  <div class="wrap">
    <div class="progress"><i id="bar"></i></div>
    <div class="stat">已答 <b id="answered">0</b>/<span id="total">0</span>　对 <b id="correct">0</b>　错 <span class="wrongc" id="wrong">0</span></div>
  </div>
</div>

<div class="wrap">
  <div class="tabs" id="tabs">
    <div class="tab active" data-sec="all">全部<small>ALL</small></div>
    <div class="tab" data-sec="6.1">6.1 销售收入<small>REVENUE</small></div>
    <div class="tab" data-sec="6.2">6.2 应收款项<small>RECEIVABLES</small></div>
    <div class="tab" data-sec="6.3">6.3 现金<small>CASH</small></div>
  </div>
  <div id="quiz"></div>
  <footer>
    第六章共 <span id="total2">0</span> 题　·　祝 6/22 财会顺利 🌿
    <br><button class="resetbtn" id="reset">清空重做</button>
  </footer>
</div>

<script>
/* ============ 题库 ============ */
const Q = [

/* ===================== 6.1 销售收入 ===================== */
{sec:"6.1",type:"单选",tag:"收入确认原则",
 stem:"根据收入确认原则，下列哪一项<b>不是</b>确认收入的必要条件？",
 opts:["商品已发出或劳务已提供","价格可以确定","货款已经全部收到","收款可以合理地得到保证"],
 ans:2,
 exp:"收入在<b>实现</b>时确认，要求“收款可以<b>合理保证</b>(reasonably assured)”，而非必须已收到全部货款。否则赊销将无法确认收入。"},

{sec:"6.1",type:"单选",tag:"所有权转移",
 stem:"甲公司以“<b>装运地交货 FOB shipping point</b>”销售一批商品，所有权何时转移给买方？",
 opts:["货物到达买方指定目的地时","货物在起运港装船后即转移","买方付清全部货款时","买方验收合格后"],
 ans:1,
 exp:"<b>装运地交货</b>：货物装船后所有权立即转移给买方。<b>目的地交货(FOB destination)</b>：货到指定目的地后才转移。"},

{sec:"6.1",type:"判断",tag:"所有权转移",
 stem:"在“目的地交货(FOB destination)”条件下，运输途中的货物所有权仍属于卖方。",
 ans:true,
 exp:"正确。目的地交货下所有权在货到目的地才转移，运输途中仍归卖方承担。"},

{sec:"6.1",type:"多选",tag:"信用卡销售",
 stem:"公司接受顾客用信用卡付款的目的包括以下哪些？（多选）",
 opts:["增加客流量、扩大客户交易金额","降低运营成本（避免直接授信的记录成本与坏账损失）","加速资金回笼（更早收到现金）","转移欺诈与空头支票风险"],
 ans:[0,1,2,3],
 exp:"五大目的：①增加客流量　②降低运营成本　③风险管控（空头支票）　④欺诈风险转移（遵守验证程序则由发卡机构担责）　⑤加速资金回笼。四项均正确。"},

{sec:"6.1",type:"计算",tag:"信用卡手续费",
 stem:"甲公司通过信用卡完成销售 <span class='fig'>3,000</span> 元，信用卡手续费率 <span class='fig'>3%</span>。请编制会计分录并计算销售净额。",
 reveal:[
   {h:"① 计算手续费",s:"手续费 = 3,000 × 3% = <span class='fig'>90</span> 元"},
   {h:"② 会计分录",s:"借：现金 Cash (+A)　　　　　　　<span class='fig'>2,910</span>\n借：信用卡折扣 Credit card discount (+XR,−R,−SE)　<span class='fig'>90</span>\n　　贷：销售收入 Sales revenue (+R,+SE)　<span class='fig'>3,000</span>"},
   {h:"③ 销售净额",s:"销售净额 = 3,000 − 90 = <span class='fig'>2,910</span> 元（在利润表中列报）"}
 ],
 exp:"信用卡折扣是<b>收入的抵减账户(Contra Revenue, XR)</b>，在利润表中冲减销售收入，而非作为费用。"},

{sec:"6.1",type:"单选",tag:"销售折扣",
 stem:"商业信用条款“<span class='fig'>2/10, n/30</span>”的含义是？",
 opts:["10天内付款享发票金额2%折扣，否则最迟30天内付全款","2天内付款享10%折扣","30天内付2%，10天内付全款","每月2、10、30号为付款日"],
 ans:0,
 exp:"<b>2/10</b>：购货日后10天内付款享发票金额2%折扣；<b>n/30</b>：若不提前付款，最迟30天内付清全款。"},

{sec:"6.1",type:"填空",tag:"销售折扣分录",
 stem:"应收账款 <span class='fig'>1,000</span> 元，客户在折扣期内付款并享受 2% 折扣。请填写分录金额：",
 blanks:[
   {label:"借：现金",ans:["980"]},
   {label:"借：销售折扣 (+XR)",ans:["20"]},
   {label:"贷：应收账款",ans:["1000","1,000"]}
 ],
 exp:"折扣 = 1,000 × 2% = 20；实收现金 = 1,000 − 20 = 980。销售折扣为收入抵减账户。"},

{sec:"6.1",type:"计算",tag:"折扣年化利率",
 stem:"在“2/10, n/30”条件下，客户提前 20 天付款（第10天而非第30天）可节约 2%。<br>(1) 求该 20 天的利率；(2) 换算成年利率；(3) 若银行借款年利率为 15%，客户是否应借款提前付款？",
 reveal:[
   {h:"① 20天利率",s:"享折扣只需付总额的98%。20天利率 = 节约金额 ÷ 支付金额 = 2 ÷ 98 = <span class='fig'>2.04%</span>"},
   {h:"② 年利率",s:"年利率 = 2.04% × (365 ÷ 20) = <span class='fig'>37.23%</span>"},
   {h:"③ 决策",s:"应该。提前付款节约的年化利率 <span class='fig'>37.23%</span> &gt; 银行借款利率 <span class='fig'>15%</span>，即机会成本&gt;融资成本，借款提前付款仍净节约。"}
 ],
 exp:"分母用 98 而非 100，因为享折扣后实付为面值的 98%。决策准则：<b>放弃折扣的机会成本 &gt; 借款融资成本 → 借款提前付</b>。"},

{sec:"6.1",type:"单选",tag:"退回 vs 折让",
 stem:"关于<b>销售退回(returns)</b>与<b>销售折让(allowances)</b>，下列说法正确的是？",
 opts:["两者都需要冲减销售成本并加回库存","销售退回需冲减成本、加回库存；销售折让不涉及库存变动","销售折让要求客户退回商品","销售退回只调减收入，不冲减成本"],
 ans:1,
 exp:"<b>销售退回</b>：实物退回、交易实质撤销 → 冲减收入、冲减成本、加回库存。<b>销售折让</b>：客户保留商品、卖方部分减价 → 仅调减收入，不动库存。"},

{sec:"6.1",type:"判断",tag:"退回与折让账户",
 stem:"“销售退回与折让”是收入的抵减账户（+XR, −R, −SE），又称“负向收入”。",
 ans:true,
 exp:"正确。它单独核算，期末从销售收入中扣除以求得净销售额，借方登记增加。"},

{sec:"6.1",type:"填空",tag:"捆绑销售五步法",
 stem:"FASB 捆绑销售收入确认<b>五步流程</b>，填出关键词：",
 blanks:[
   {label:"1. 识别______合同",ans:["客户"]},
   {label:"2. 识别______义务",ans:["履约"]},
   {label:"3. 确定______价格",ans:["交易"]},
   {label:"4. ______交易价格",ans:["分摊","分配"]},
   {label:"5. 在______完成时确认收入",ans:["履约义务","履约"]}
 ],
 exp:"识别客户合同 → 识别履约义务 → 确定交易价格 → 分摊交易价格（按公允价值）→ 履约义务完成时确认收入（商品一次性确认，服务按时间分期）。"},

{sec:"6.1",type:"计算",tag:"捆绑销售分摊",
 stem:"某公司销售 iPad 捆绑套餐，合同总价 <span class='fig'>$500</span>。其中硬件（含必备软件）公允价值 <span class='fig'>$450</span>，未来 5 年软件升级服务公允价值 <span class='fig'>$50</span>。<br>(1) 第1年确认收入多少？(2) 第2–5年每年确认多少？",
 reveal:[
   {h:"① 分摊价格",s:"硬件 = $450（一次性）；软件升级 = $50 ÷ 5 = <span class='fig'>$10/年</span>"},
   {h:"② 第1年收入",s:"硬件450 + 当年软件10 = <span class='fig'>$460</span>"},
   {h:"③ 第2–5年",s:"每年 <span class='fig'>$10</span>；5年合计 = 460 + 10×4 = <span class='fig'>$500</span>，与合同总价一致"}
 ],
 exp:"硬件属一次性履约义务，第1年确认；服务在5年内按时间分期确认。"},

{sec:"6.1",type:"填空",tag:"销售毛利率",
 stem:"销售毛利率 = ______ ÷ 销售净额。（填分子）",
 blanks:[{label:"分子",ans:["销售毛利润","毛利润","销售毛利"]}],
 exp:"销售毛利率 = 销售毛利润 ÷ 销售净额；毛利润 = 销售净额 − 营业成本。其他条件相同下，毛利率越高净利润越高。"},

{sec:"6.1",type:"计算",tag:"销售净额",
 stem:"已知：销售收入 <span class='fig'>6,000</span>、信用卡折扣 <span class='fig'>90</span>、销售折扣 <span class='fig'>20</span>、销售退回与折让 <span class='fig'>500</span>。求在利润表列报的销售净额。",
 reveal:[
   {h:"计算",s:"销售净额 = 6,000 − 90 − 20 − 500 = <span class='fig'>5,390</span>"}
 ],
 exp:"信用卡折扣、现金折扣、销售退回与折让均需<b>分别单独核算</b>并从销售收入中扣除，便于管理层监控各渠道/政策的影响。"},

{sec:"6.1",type:"单选",tag:"道德问题",
 stem:"关于返利/折扣，符合收入确认规则的做法是？",
 opts:["将返利作为费用列报","延迟到下一期再抵减收入","在销售当期从收入中抵减返利/折扣","不予处理以提高毛利"],

/* ============ 渲染与交互 ============ */
const norm = s => (s||"").toString().trim().replace(/[，,\s]/g,"").replace(/＋/g,"+").replace(/[−－]/g,"-").toLowerCase();
const state = {filter:"all", answered:new Set(), correct:new Set(), wrong:new Set()};
const quiz = document.getElementById('quiz');
document.getElementById('total').textContent = Q.length;
document.getElementById('total2').textContent = Q.length;

function letter(i){return String.fromCharCode(65+i)}

function updateScore(){
  const a=state.answered.size, c=state.correct.size, w=state.wrong.size;
  document.getElementById('answered').textContent=a;
  document.getElementById('correct').textContent=c;
  document.getElementById('wrong').textContent=w;
  document.getElementById('bar').style.width=(Q.length? a/Q.length*100:0)+'%';
}

function mark(i,ok){
  state.answered.add(i);
  if(ok) state.correct.add(i); else state.wrong.add(i);
  updateScore();
}

function fb(el,ok,html){
  el.className='fb '+(ok?'right':'rong')+' show';
  el.innerHTML='<div class="verdict">'+(ok?'✓ 正确':'✗ 再想想')+'</div><div class="exp">'+html+'</div>';
}

function render(){
  quiz.innerHTML='';
  let shown=0, lastSec='';
  Q.forEach((q,i)=>{
    if(state.filter!=='all' && q.sec!==state.filter) return;
    if(q.sec!==lastSec){
      lastSec=q.sec;
      const names={"6.1":"销售收入的会计核算","6.2":"应收款项的计量与报告","6.3":"现金的报告与保障"};
      const cnt=Q.filter(x=>x.sec===q.sec).length;
      const hd=document.createElement('div');
      hd.className='section-hd';
      hd.innerHTML='<span class="no">'+q.sec+'</span><span class="nm">'+names[q.sec]+'</span><span class="cnt">'+cnt+' 题</span>';
      quiz.appendChild(hd);
    }
    shown++;
    quiz.appendChild(buildCard(q,i,shown));
  });
}

function buildCard(q,i,n){
  const card=document.createElement('div');
  card.className='qcard';
  const head='<div class="qhead"><span class="qnum">'+q.sec+' · '+n+'</span><span class="qtype">'+q.type+'</span><span class="qtag">'+q.tag+'</span></div>';
  const stem='<p class="qstem">'+q.stem+'</p>';
  card.innerHTML=head+stem;

  if(q.type==='单选'||q.type==='多选') buildChoice(card,q,i);
  else if(q.type==='判断') buildTF(card,q,i);
  else if(q.type==='填空') buildFill(card,q,i);
  else if(q.type==='filltable') buildFillTable(card,q,i);
  else buildCalc(card,q,i); // 计算 / calc
  return card;
}

/* —— 单选/多选 —— */
function buildChoice(card,q,i){
  const multi=q.type==='多选';
  const wrap=document.createElement('div'); wrap.className='opts';
  const ans=multi?q.ans:[q.ans];
  const picked=new Set();
  q.opts.forEach((o,k)=>{
    const d=document.createElement('div'); d.className='opt';
    d.innerHTML='<span class="key">'+letter(k)+'</span><span>'+o+'</span>';
    d.onclick=()=>{
      if(card.dataset.done) return;
      if(multi){
        if(picked.has(k)){picked.delete(k);d.classList.remove('sel')}
        else{picked.add(k);d.classList.add('sel')}
      } else {
        picked.clear(); picked.add(k);
        wrap.querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
      }
    };
    wrap.appendChild(d);
  });
  card.appendChild(wrap);
  const fbx=document.createElement('div'); fbx.className='fb';
  const row=document.createElement('div'); row.className='btnrow';
  const submit=document.createElement('button'); submit.className='act'; submit.textContent='提交';
  submit.onclick=()=>{
    if(card.dataset.done||picked.size===0) {if(picked.size===0){submit.textContent='请先选择';setTimeout(()=>submit.textContent='提交',900);} return;}
    card.dataset.done='1';
    const ok = ans.length===picked.size && ans.every(a=>picked.has(a));
    wrap.querySelectorAll('.opt').forEach((x,k)=>{
      x.classList.add('disabled'); x.classList.remove('sel');
      if(ans.includes(k)) x.classList.add('correct');
      else if(picked.has(k)) x.classList.add('wrong');
    });
    const ansTxt='正确答案：'+ans.map(letter).join("、");
    fb(fbx,ok,'<b>'+ansTxt+'</b><br>'+q.exp);
    mark(i,ok); submit.disabled=true;
  };
  row.appendChild(submit); card.appendChild(row); card.appendChild(fbx);
}

/* —— 判断 —— */
function buildTF(card,q,i){
  const wrap=document.createElement('div'); wrap.className='opts';
  [['正确',true],['错误',false]].forEach(([t,v])=>{
    const d=document.createElement('div'); d.className='opt';
    d.innerHTML='<span class="key">'+(v?'✓':'✗')+'</span><span>'+t+'</span>';
    d.onclick=()=>{
      if(card.dataset.done) return;
      card.dataset.done='1';
      const ok=(v===q.ans);
      wrap.querySelectorAll('.opt').forEach(x=>x.classList.add('disabled'));
      d.classList.add(ok?'correct':'wrong');
      if(!ok){ // 高亮正确项
        wrap.querySelectorAll('.opt').forEach((x,idx)=>{ if((idx===0)===q.ans) x.classList.add('correct'); });
      }
      fb(fbx,ok,'<b>正确答案：'+(q.ans?'正确':'错误')+'</b><br>'+q.exp);
      mark(i,ok);
    };
    wrap.appendChild(d);
  });
  const fbx=document.createElement('div'); fbx.className='fb';
  card.appendChild(wrap); card.appendChild(fbx);
}

/* —— 填空 —— */
function buildFill(card,q,i){
  const box=document.createElement('div');
  const inputs=[];
  q.blanks.forEach(b=>{
    const row=document.createElement('div'); row.className='blankrow';
    const inp=document.createElement('input'); inp.className='blank'; inp.type='text';
    inp.placeholder='填写'; inputs.push({inp,ans:b.ans});
    row.innerHTML='<span>'+b.label+'：</span>'; row.appendChild(inp);
    box.appendChild(row);
  });
  card.appendChild(box);
  const fbx=document.createElement('div'); fbx.className='fb';
  const rowb=document.createElement('div'); rowb.className='btnrow';
  const sub=document.createElement('button'); sub.className='act'; sub.textContent='提交';
  sub.onclick=()=>{
    if(card.dataset.done) return;
    card.dataset.done='1';
    let allok=true; const list=[];
    inputs.forEach(o=>{
      const got=norm(o.inp.value);
      const ok=o.ans.some(a=>norm(a)===got);
      o.inp.classList.add(ok?'ok':'no'); o.inp.disabled=true;
      if(!ok) allok=false;
      list.push(o.ans[0]);
    });
    fb(fbx,allok,'<b>参考答案：'+list.join(" / ")+'</b><br>'+q.exp);
    mark(i,allok); sub.disabled=true;
  };
  rowb.appendChild(sub); card.appendChild(rowb); card.appendChild(fbx);
}

/* —— 表格填空 —— */
function buildFillTable(card,q,i){
  const t=document.createElement('table'); t.className='fillt';
  let html='<tr>'+q.headers.map(h=>'<th>'+h+'</th>').join('')+'</tr>';
  const inputs=[];
  q.rows.forEach((r,ri)=>{
    html+='<tr>';
    r.cells.forEach((c,ci)=>{
      if(typeof c==='object'&&c.ans){
        const id='ft'+i+'_'+ri+'_'+ci;
        html+='<td><input class="blank" id="'+id+'" type="text" placeholder="?"></td>';
        inputs.push({id,ans:c.ans});
      } else html+='<td>'+c+'</td>';
    });
    html+='</tr>';
  });
  t.innerHTML=html; card.appendChild(t);
  const fbx=document.createElement('div'); fbx.className='fb';
  const rowb=document.createElement('div'); rowb.className='btnrow';
  const sub=document.createElement('button'); sub.className='act'; sub.textContent='提交';
  sub.onclick=()=>{
    if(card.dataset.done) return;
    card.dataset.done='1';
    let allok=true;
    inputs.forEach(o=>{
      const el=document.getElementById(o.id);
      const got=norm(el.value);
      const ok=o.ans.some(a=>norm(a)===got);
      el.classList.add(ok?'ok':'no'); el.disabled=true;
      if(!ok){ allok=false; el.value=o.ans[0]; el.classList.remove('no'); el.classList.add('no'); }
    });
    fb(fbx,allok,q.exp);
    mark(i,allok); sub.disabled=true;
  };
  rowb.appendChild(sub); card.appendChild(rowb); card.appendChild(fbx);
}

/* —— 计算大题（揭示答案）—— */
function buildCalc(card,q,i){
  const rev=document.createElement('div'); rev.className='reveal';
  let html='<h4>解答步骤</h4>';
  (q.reveal||[]).forEach(r=>{ html+='<div class="step"><b>'+r.h+'：</b>'+r.s+'</div>'; });
  if(q.exp) html+='<div class="step" style="margin-top:8px;color:var(--ink-soft)">💡 '+q.exp+'</div>';
  rev.innerHTML=html;
  const row=document.createElement('div'); row.className='btnrow';
  const show=document.createElement('button'); show.className='act'; show.textContent='查看解答';
  const got=document.createElement('button'); got.className='act ghost'; got.textContent='我做对了';
  const miss=document.createElement('button'); miss.className='act ghost'; miss.textContent='做错了';
  show.onclick=()=>{ rev.classList.add('show'); show.disabled=true; };
  got.onclick=()=>{ if(card.dataset.done)return; card.dataset.done='1'; rev.classList.add('show'); mark(i,true); got.disabled=true; miss.disabled=true; got.textContent='✓ 已记为正确'; };
  miss.onclick=()=>{ if(card.dataset.done)return; card.dataset.done='1'; rev.classList.add('show'); mark(i,false); got.disabled=true; miss.disabled=true; miss.textContent='✗ 已记为错误'; };
  row.appendChild(show); row.appendChild(got); row.appendChild(miss);
  card.appendChild(row); card.appendChild(rev);
}

/* —— tab 切换 —— */
document.getElementById('tabs').addEventListener('click',e=>{
  const t=e.target.closest('.tab'); if(!t) return;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); state.filter=t.dataset.sec; render(); window.scrollTo({top:0,behavior:'smooth'});
});

/* —— 重置 —— */
document.getElementById('reset').onclick=()=>{
  state.answered.clear(); state.correct.clear(); state.wrong.clear();
  updateScore(); render(); window.scrollTo({top:0,behavior:'smooth'});
};

render(); updateScore();
</script>
