<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财务会计 · 第5–8章 做题册</title>
<style>
  :root{
    --paper:#f3f1e9;        /* 账簿纸 */
    --paper-rule:#d9e0db;   /* 横纹 */
    --ink:#1c2a26;          /* 墨色 */
    --ink-soft:#5b6b64;
    --line:#c8cdc6;
    --green:#1f6f53;        /* 入账绿 (借/正确) */
    --green-bg:#e7f1eb;
    --red:#9e3631;          /* 账簿红 (错误) */
    --red-bg:#f6e7e5;
    --gold:#b07d2b;         /* 强调金 */
    --card:#fbfaf5;
    --shadow:0 1px 0 rgba(28,42,38,.05),0 6px 22px -16px rgba(28,42,38,.45);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
    line-height:1.6;font-size:16px;
  }
  .num{font-family:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums;}

  /* ---- 顶部 ---- */
  header{
    background:var(--ink);color:#f3f1e9;padding:22px 18px 16px;
    background-image:linear-gradient(var(--ink),var(--ink));
    border-bottom:3px double #4a5a53;
  }
  .wrap{max-width:820px;margin:0 auto}
  .eyebrow{font-size:12px;letter-spacing:.32em;color:#9fb3aa;text-transform:uppercase;margin:0 0 6px}
  header h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.02em}
  header h1 small{display:block;font-size:13px;font-weight:500;color:#b9c8c1;letter-spacing:.04em;margin-top:6px}

  /* ---- 章节标签 ---- */
  nav.chapters{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--line);}
  .chapters .wrap{display:flex;gap:6px;overflow-x:auto;padding:10px 14px;scrollbar-width:none}
  .chapters .wrap::-webkit-scrollbar{display:none}
  .chip{
    flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    border-radius:999px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
    transition:.15s;
  }
  .chip:hover{border-color:var(--green)}
  .chip.active{background:var(--ink);color:#f3f1e9;border-color:var(--ink)}

  main{max-width:820px;margin:0 auto;padding:18px 14px 90px}

  /* ---- 计分条 ---- */
  .scorebar{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:var(--card);border:1px solid var(--line);border-left:4px solid var(--gold);
    border-radius:10px;padding:12px 16px;margin:6px 0 20px;box-shadow:var(--shadow);
  }
  .scorebar .ttl{font-weight:800;font-size:17px;margin-right:auto}
  .stat{font-size:13px;color:var(--ink-soft)}
  .stat b{font-size:18px;color:var(--ink);margin-right:2px}
  .stat .ok{color:var(--green)} .stat .no{color:var(--red)}
  .reset{border:1px solid var(--line);background:transparent;color:var(--ink-soft);
    border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer}
  .reset:hover{border-color:var(--red);color:var(--red)}

  /* ---- 板块标题 ---- */
  .section-head{display:flex;align-items:baseline;gap:10px;margin:30px 0 14px;padding-bottom:8px;
    border-bottom:2px solid var(--ink)}
  .section-head .tag{font-family:"SFMono-Regular",ui-monospace,monospace;font-size:11px;letter-spacing:.2em;
    color:#fff;background:var(--green);padding:3px 9px;border-radius:4px;text-transform:uppercase}
  .section-head .tag.ex{background:var(--gold)}
  .section-head h2{margin:0;font-size:19px;font-weight:800}
  .section-head .cnt{margin-left:auto;font-size:13px;color:var(--ink-soft)}

  /* ---- 选择题卡片 ---- */
  .q{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 18px 6px;
    margin-bottom:16px;box-shadow:var(--shadow)}
  .q .stem{display:flex;gap:12px;margin-bottom:14px}
  .q .qno{flex:0 0 auto;font-family:"SFMono-Regular",ui-monospace,monospace;font-weight:700;color:var(--green);
    background:var(--green-bg);border-radius:7px;min-width:34px;height:30px;display:flex;align-items:center;
    justify-content:center;font-size:14px}
  .q .qtext{font-weight:600;font-size:16px;padding-top:3px}
  .q .qtext .en{display:block;font-weight:400;font-size:12.5px;color:var(--ink-soft);margin-top:5px;font-style:italic}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{display:flex;gap:11px;align-items:flex-start;border:1px solid var(--line);background:#fff;
    border-radius:9px;padding:11px 13px;cursor:pointer;transition:.12s;font-size:15px}
  .opt:hover{border-color:var(--green);background:var(--green-bg)}
  .opt .key{flex:0 0 auto;font-family:"SFMono-Regular",ui-monospace,monospace;font-weight:700;color:var(--ink-soft);
    width:20px}
  .opt.correct{background:var(--green-bg);border-color:var(--green)}
  .opt.correct .key{color:var(--green)}
  .opt.wrong{background:var(--red-bg);border-color:var(--red)}
  .opt.wrong .key{color:var(--red)}
  .opt.disabled{cursor:default;opacity:.92}
  .opt.disabled:hover{background:#fff;border-color:var(--line)}
  .opt.correct.disabled:hover{background:var(--green-bg);border-color:var(--green)}
  .opt.wrong.disabled:hover{background:var(--red-bg);border-color:var(--red)}
  .mark{margin-left:auto;font-weight:800;font-size:15px}
  .mark.ok{color:var(--green)} .mark.no{color:var(--red)}

  .explain{margin:13px 0 12px;border-top:1px dashed var(--line);padding-top:12px;
    font-size:14.5px;color:var(--ink);display:none}
  .explain.show{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1}}
  .explain .lbl{display:inline-block;font-size:11px;letter-spacing:.15em;color:var(--gold);font-weight:800;
    margin-bottom:5px}
  .explain b{color:var(--green)}
  .explain .calc{font-family:"SFMono-Regular",ui-monospace,monospace;background:#f0efe7;border-radius:6px;
    padding:2px 6px;font-size:13.5px;font-variant-numeric:tabular-nums}

  /* ---- 计算题 ---- */
  .ex{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;
    box-shadow:var(--shadow);overflow:hidden}
  .ex .exhead{padding:16px 18px;border-left:4px solid var(--gold)}
  .ex .extitle{font-weight:800;font-size:16px;margin:0 0 10px}
  .ex .prob{font-size:15px}
  .ex table.data{border-collapse:collapse;margin:12px 0;font-size:14px;width:100%;max-width:480px}
  .ex table.data td,.ex table.data th{border:1px solid var(--line);padding:6px 10px;text-align:left}
  .ex table.data th{background:#eef0e9;font-weight:700}
  .ex table.data td.r{text-align:right;font-family:"SFMono-Regular",ui-monospace,monospace;
    font-variant-numeric:tabular-nums}
  .ex .reveal{width:100%;border:none;border-top:1px solid var(--line);background:var(--ink);color:#f3f1e9;
    padding:13px;font-size:14.5px;font-weight:700;cursor:pointer;letter-spacing:.04em}
  .ex .reveal:hover{background:#26352f}
  .sol{display:none;padding:16px 18px;background:#f7f6ef;border-top:1px solid var(--line);font-size:14.5px}
  .sol.show{display:block}
  .sol h4{margin:14px 0 7px;font-size:14px;color:var(--green);letter-spacing:.02em}
  .sol h4:first-child{margin-top:0}
  .sol .step{margin:5px 0}
  .sol .calc{font-family:"SFMono-Regular",ui-monospace,monospace;background:#ecebe2;border-radius:6px;
    padding:8px 11px;margin:7px 0;font-size:13.5px;font-variant-numeric:tabular-nums;white-space:pre-wrap;
    line-height:1.7;overflow-x:auto}
  .sol .ans{background:var(--green-bg);border:1px solid var(--green);border-radius:8px;padding:10px 13px;
    margin-top:12px;font-weight:700;color:var(--green)}
  .je{font-family:"SFMono-Regular",ui-monospace,monospace;font-size:13px;background:#ecebe2;border-radius:6px;
    padding:9px 11px;margin:7px 0;white-space:pre;overflow-x:auto;line-height:1.8}

  footer{text-align:center;color:var(--ink-soft);font-size:12.5px;padding:0 14px 36px}
  @media(max-width:520px){
    header h1{font-size:22px}
    .opt{font-size:14.5px}
    main{padding:14px 11px 80px}
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <p class="eyebrow">Financial Accounting · Final Review</p>
    <h1>财务会计 做题册
      <small>第 5–8 章 · 选择题 + 计算题 · 中文题干 + 逐题解析</small>
    </h1>
  </div>
</header>

<nav class="chapters">
  <div class="wrap" id="chapTabs"></div>
</nav>

<main>
  <div class="scorebar">
    <span class="ttl" id="chapTitle"></span>
    <span class="stat">已答 <b id="sAns">0</b>/<span id="sTot">0</span></span>
    <span class="stat ok">对 <b class="ok" id="sOk">0</b></span>
    <span class="stat no">错 <b class="no" id="sNo">0</b></span>
    <button class="reset" id="resetBtn">重做本章</button>
  </div>
  <div id="content"></div>
</main>

<footer>共 56 道选择题 + 4 道计算/练习题 · 点击选项即时判分 · 计算题点「查看完整解答」展开<br>
祝考试顺利 · 6/22</footer>

<script>

应付薪酬  475→515  上升 40   负债↑ → +40</div>

+ 折旧               3,420
+ 应收账款减少         145
− 预付保险费增加       (25)
− 预收收入减少         (10)
+ 应付薪酬增加          40
─────────────────────────
  经营活动现金净额   22,085</div>
      <div class="ans">经营活动现金净额 = $22,085</div>`}

   {title:"练习：Zachary 公司 — LIFO / FIFO / 加权平均 求销售成本",
    prob:`4月存货记录：<table class="data"><tr><th>日期</th><th>摘要</th><th>数量·单价</th></tr>

      <tr><td>4/12</td><td>购入</td><td class="r">300 件 @ $4</td></tr>
      <tr><td>4/22</td><td>购入</td><td class="r">500 件 @ $5</td></tr>
      <tr><td>4/30</td><td>售出</td><td class="r">1,600 件</td></tr></table>
      分别用 a.LIFO &nbsp;b.FIFO &nbsp;c.加权平均 计算 4月30日的销售成本(定期盘存制)。`,
    sol:`<h4>基础数据</h4>

售出 1,600 件，期末 2,200 件</div>
      <h4>a. LIFO（后进先出，先结转最近购入）</h4>
      <div class="calc">500@$5 = 2,500
300@$4 = 1,200
800@$3 = 2,400   ← (1,600−500−300=800，取4/8批次)
COGS = 2,500+1,200+2,400 = 6,100</div>
      <h4>b. FIFO（先进先出，先结转最早存货）</h4>
      <div class="calc">1,600 件全部来自期初 2,000@$2
COGS = 1,600 × 2 = 3,200</div>
      <h4>c. 加权平均</h4>
      <div class="calc">平均单价 = 10,700 / 3,800 ≈ $2.8158
COGS = 1,600 × 2.8158 ≈ 4,505</div>
      <div class="ans">LIFO 销售成本 $6,100 ｜ FIFO 销售成本 $3,200 ｜ 加权平均销售成本 ≈ $4,505</div>`}

   {title:"练习：Lance's Truck Stop — 直线 / 工作量 / 双倍余额递减 三法折旧",
    prob:`去年年初购入自动洗车机 $135,000，预计 10 年后可按 $35,000 售出(残值)。预计一生可洗 50,000 辆车。
      去年(第1年)洗 7,000 辆，今年(第2年)洗 9,000 辆。<br>
      要求：用 a.直线法 &nbsp;b.工作量法(按服务量) &nbsp;c.双倍余额递减法，计算前两年各自的折旧费用。`,
    sol:`<h4>基础</h4>
      <div class="calc">可折旧基数 = 成本 − 残值 = 135,000 − 35,000 = 100,000</div>
      <h4>a. 直线法</h4>
      <div class="calc">每年 = 100,000 / 10 = 10,000
第1年 = 10,000 ｜ 第2年 = 10,000</div>
      <h4>b. 工作量法（按洗车量）</h4>
      <div class="calc">每辆 = 100,000 / 50,000 = $2
第1年 = 7,000 × 2 = 14,000
第2年 = 9,000 × 2 = 18,000</div>
      <h4>c. 双倍余额递减法（率 = 2/10 = 20%，不扣残值）</h4>
      <div class="calc">第1年 = 135,000 × 20% = 27,000   账面余 108,000
第2年 = 108,000 × 20% = 21,600   账面余 86,400</div>
      <div class="ans">直线：10,000 / 10,000 ｜ 工作量：14,000 / 18,000 ｜ 双倍余额递减：27,000 / 21,600</div>`}
  ]
 }
};

/* ===================== 渲染与交互 ===================== */
const KEYS=["a","b","c","d","e","f","g","h"];
const state={chap:5, results:{}}; // results[chap] = {answered, ok, no}

function ensureRes(c){ if(!state.results[c]) state.results[c]={answered:0,ok:0,no:0,picked:{}}; return state.results[c]; }

function buildTabs(){
  const box=document.getElementById("chapTabs"); box.innerHTML="";
  Object.keys(DATA).forEach(c=>{
    const b=document.createElement("button");
    b.className="chip"+(+c===state.chap?" active":"");
    b.textContent="第"+c+"章";
    b.onclick=()=>{state.chap=+c; render();};
    box.appendChild(b);
  });
}

function updateScore(){
  const c=state.chap, r=ensureRes(c), d=DATA[c];
  document.getElementById("chapTitle").textContent=d.title;
  document.getElementById("sTot").textContent=d.mc.length;
  document.getElementById("sAns").textContent=r.answered;
  document.getElementById("sOk").textContent=r.ok;
  document.getElementById("sNo").textContent=r.no;
}

function render(){
  buildTabs();
  const c=state.chap, d=DATA[c], r=ensureRes(c);
  const root=document.getElementById("content"); root.innerHTML="";

  /* 选择题板块 */
  const mcHead=document.createElement("div"); mcHead.className="section-head";
  mcHead.innerHTML=`<span class="tag">MC</span><h2>选择题</h2><span class="cnt">${d.mc.length} 题</span>`;
  root.appendChild(mcHead);

  d.mc.forEach((q,i)=>{
    const card=document.createElement("div"); card.className="q";
    const stem=document.createElement("div"); stem.className="stem";
    stem.innerHTML=`<div class="qno">${i+1}</div><div class="qtext">${q.q}</div>`;
    card.appendChild(stem);

    const opts=document.createElement("div"); opts.className="opts";
    q.options.forEach((opt,oi)=>{
      const o=document.createElement("div"); o.className="opt";
      o.innerHTML=`<span class="key">${KEYS[oi]}.</span><span>${opt}</span>`;
      o.onclick=()=>pick(c,i,oi,card,opts,q);
      opts.appendChild(o);
    });
    card.appendChild(opts);

    const ex=document.createElement("div"); ex.className="explain";
    ex.innerHTML=`<span class="lbl">解析</span><div>${q.ex}</div>`;
    card.appendChild(ex);

    // 若已答过，恢复状态
    const picked=r.picked[i];
    if(picked!==undefined) applyAnswered(opts,q,picked,ex);
    root.appendChild(card);
  });

  /* 计算题板块 */
  const exHead=document.createElement("div"); exHead.className="section-head";
  exHead.innerHTML=`<span class="tag ex">EX</span><h2>计算 / 练习题</h2><span class="cnt">${d.ex.length} 题</span>`;
  root.appendChild(exHead);

  d.ex.forEach(item=>{
    const box=document.createElement("div"); box.className="ex";
    const head=document.createElement("div"); head.className="exhead";
    head.innerHTML=`<p class="extitle">${item.title}</p><div class="prob">${item.prob}</div>`;
    box.appendChild(head);
    const btn=document.createElement("button"); btn.className="reveal"; btn.textContent="查看完整解答 ▾";
    const sol=document.createElement("div"); sol.className="sol"; sol.innerHTML=item.sol;
    btn.onclick=()=>{ const on=sol.classList.toggle("show"); btn.textContent=on?"收起解答 ▴":"查看完整解答 ▾"; };
    box.appendChild(btn); box.appendChild(sol);
    root.appendChild(box);
  });

  updateScore();
  window.scrollTo({top:0,behavior:"smooth"});
}

function pick(c,i,oi,card,opts,q){
  const r=ensureRes(c);
  if(r.picked[i]!==undefined) return; // 已答，锁定
  r.picked[i]=oi; r.answered++;
  if(oi===q.answer) r.ok++; else r.no++;
  const ex=card.querySelector(".explain");
  applyAnswered(opts,q,oi,ex);
  updateScore();
}

function applyAnswered(opts,q,picked,ex){
  [...opts.children].forEach((o,oi)=>{
    o.classList.add("disabled");
    if(oi===q.answer){o.classList.add("correct");
      o.insertAdjacentHTML("beforeend",`<span class="mark ok">✓</span>`);}
    if(oi===picked && picked!==q.answer){o.classList.add("wrong");
      o.insertAdjacentHTML("beforeend",`<span class="mark no">✗</span>`);}
  });
  ex.classList.add("show");
}

document.getElementById("resetBtn").onclick=()=>{
  state.results[state.chap]={answered:0,ok:0,no:0,picked:{}};
  render();
};

render();
</script>
